                    <button className="btn btn-primary" onClick={() => setActiveTab(0)}>
                      Step 1 빈도분석
                    </button>
                  )}
                  {selectedRate && (
                    <button className="btn btn-primary" onClick={() => setActiveTab(1)}>
                      Step 2 갭분석
                    </button>
                  )}
                </div>
              </div>
            ) : comprehensiveLoading ? (
              <div className="card loading">종합분석 중...</div>
            ) : (
              <>
                {/* Final prediction card — Phase 5-3: 강화 */}
                {finalPrediction != null && (
                  <div className="prediction-card mb-16">
                    <div className="pred-label">1순위 예상 낙찰가</div>
                    <div className="pred-value">{fmtAmount(finalPrediction)}</div>
                    <div className="pred-sub">
                      확정 사정률: {confirmedRate}%
                      {finalRate && ` | 예측 사정률: ${finalRate}%`}
                    </div>
                  </div>
                )}

                {/* Phase 5-3: Strategy card */}
                {confirmedRate && announcement?.budget && (
                  <div className="strategy-card mb-16">
                    <div style={{fontSize:'14px',fontWeight:'700',marginBottom:'16px'}}>투찰 전략 요약</div>
                    <div className="strategy-row">
                      <span className="strategy-label">확정사정률 기반 투찰금액</span>
                      <span className="strategy-value">{fmtAmount(confirmedBidAmount)}</span>
                    </div>
                    <div className="strategy-row">
                      <span className="strategy-label">권장 투찰 범위 (±0.02%)</span>
                      <span className="strategy-value">
                        {fmtAmount(calcBidAmount(parseFloat(confirmedRate) - 0.02))} ~ {fmtAmount(calcBidAmount(parseFloat(confirmedRate) + 0.02))}
                      </span>
                    </div>
                    <div className="strategy-row">
                      <span className="strategy-label">예상 적중 확률</span>
                      <span className="strategy-value" style={{color:'#34D399'}}>
                        {periodComparisons.length > 0
                          ? `${(periodComparisons.reduce((s, p) => s + (p.match_rate || 0), 0) / periodComparisons.length).toFixed(1)}%`
                          : '-'}
                      </span>
                    </div>
                  </div>
                )}

                {/* 결합 예측 후보 리스트 */}
                {combinedData?.candidates?.length > 0 && (
                  <div className="card mb-16">
                    <div className="card-header">
                      <div>
                        <div className="card-title">결합 예측 후보 (빈도+갭)</div>
                        <div className="card-sub">빈도 피크와 갭 중간점을 결합한 최적 후보 | 빈도 데이터 {combinedData.data_summary?.freq_data_count || 0}건, 갭 데이터 {combinedData.data_summary?.gap_data_count || 0}건</div>
                      </div>
                    </div>
                    <div className="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>순위</th><th>사정률</th><th>출처</th><th>빈도</th><th>1순위</th><th>빈도점수</th><th>갭점수</th><th>결합점수</th><th>예상투찰금액</th><th>신뢰도</th><th>선택</th>
                          </tr>
                        </thead>
                        <tbody>
                          {combinedData.candidates.map((c, i) => (
                            <tr key={i} style={{background: c.is_recommended ? '#F0FDF4' : 'transparent'}}>
                              <td style={{fontWeight:'700',color:'var(--primary)'}}>{c.rank}{c.is_recommended ? ' ★' : ''}</td>
                              <td style={{fontWeight:'700'}}>{c.rate}%</td>
                              <td><span style={{
                                fontSize:'11px',padding:'2px 6px',borderRadius:'4px',
                                background: c.source === '빈도+갭' ? '#DBEAFE' : c.source === '빈도' ? '#FEF3C7' : '#E0E7FF',
                                color: c.source === '빈도+갭' ? '#1E40AF' : c.source === '빈도' ? '#92400E' : '#3730A3',
                              }}>{c.source}</span></td>
                              <td>{c.freq_count}건</td>
                              <td style={{color:'#059669',fontWeight:'600'}}>{c.first_place_count}건</td>
                              <td>
                                <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                                  <div style={{width:'40px',height:'5px',background:'#E2E8F0',borderRadius:'3px',overflow:'hidden'}}>
                                    <div style={{width:`${c.freq_score * 100}%`,height:'100%',background:'#F59E0B',borderRadius:'3px'}}></div>
                                  </div>
                                  <span style={{fontSize:'10px',color:'#94A3B8'}}>{(c.freq_score * 100).toFixed(0)}</span>
                                </div>
                              </td>
                              <td>
                                <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                                  <div style={{width:'40px',height:'5px',background:'#E2E8F0',borderRadius:'3px',overflow:'hidden'}}>
                                    <div style={{width:`${c.gap_score * 100}%`,height:'100%',background:'#6366F1',borderRadius:'3px'}}></div>
                                  </div>
                                  <span style={{fontSize:'10px',color:'#94A3B8'}}>{(c.gap_score * 100).toFixed(0)}</span>
                                </div>
                              </td>
                              <td>
                                <div style={{display:'flex',alignItems:'center',gap:'4px'}}>
                                  <div style={{width:'50px',height:'6px',background:'#E2E8F0',borderRadius:'3px',overflow:'hidden'}}>
                                    <div style={{width:`${c.combined_score * 100}%`,height:'100%',background: c.combined_score > 0.6 ? '#059669' : c.combined_score > 0.3 ? '#F59E0B' : '#94A3B8',borderRadius:'3px'}}></div>
                                  </div>
                                  <span style={{fontSize:'11px',fontWeight:'600'}}>{(c.combined_score * 100).toFixed(0)}</span>
                                </div>
                              </td>
                              <td style={{fontSize:'12px',color:'#B45309'}}>{c.bid_amount ? fmtAmount(c.bid_amount) : '-'}</td>
                              <td><span style={{fontSize:'11px',color: c.confidence === '높음' ? '#059669' : c.confidence === '보통' ? '#D97706' : '#94A3B8',fontWeight:'600'}}>{c.confidence}</span></td>
                              <td>
                                <button className="btn btn-outline" style={{padding:'2px 8px',fontSize:'11px'}}
                                  onClick={() => { setConfirmedRate(String(c.rate)); setConfirmedRateInput(String(c.rate)); }}>
                                  확정
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* Phase 5-1: Period matching rate bar chart */}
                {periodComparisons.length > 0 && (
                  <div className="card mb-16">
                    <div className="card-title" style={{marginBottom:'16px'}}>기간별 매칭률 비교</div>
                    {periodComparisons.map((pc, i) => {
                      const rate = pc.match_rate || 0;
                      const color = rate >= 70 ? '#059669' : rate >= 40 ? '#D97706' : '#DC2626';
                      return (
                        <div key={i} className="match-bar-container">
                          <div className="match-bar-label">{pc.period}개월</div>
                          <div className="match-bar-track">
                            <div className="match-bar-fill" style={{width: `${Math.max(rate, 5)}%`, background: color}}>
                              {rate >= 15 ? `${rate}%` : ''}
                            </div>
                          </div>
                          <div className="match-bar-count">{pc.total_count || 0}건 중 {pc.match_count || 0}건</div>
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Parent org analysis */}
                {parentOrg && (
                  <div className="card mb-16">
                    <div className="card-title" style={{marginBottom:'12px'}}>상위기관 분석</div>
                    <div className="grid-3">
                      <div className="metric-box">
                        <div className="metric-label">상위기관</div>
                        <div style={{fontSize:'16px',fontWeight:'700',margin:'4px 0'}}>{parentOrg.name || '-'}</div>
                      </div>
                      <div className="metric-box">
                        <div className="metric-label">평균 사정률</div>
                        <div className="metric-val" style={{color:'var(--primary)'}}>{parentOrg.avg_rate || '-'}%</div>
                      </div>
                      <div className="metric-box">
                        <div className="metric-label">매칭률</div>
                        <div className="metric-val" style={{color:'#059669'}}>{parentOrg.match_rate || '-'}%</div>
                      </div>
                    </div>
                  </div>
                )}

                {/* Phase 4: 밀어내기식 검토 */}
                {confirmedRate && (
                  <div className="card mb-16">
                    <div className="card-header">
                      <div>
                        <div className="card-title">밀어내기식 검토 (Sliding Window)</div>
                        <div className="card-sub">윈도우를 이동하며 확정사정률({confirmedRate}%)의 1순위 적중 여부를 시계열로 검증</div>
                      </div>
                    </div>
                    <div className="filter-bar" style={{marginBottom:'12px',padding:'0 16px'}}>
                      <span style={{fontSize:'12px',fontWeight:'600',color:'var(--text-secondary)'}}>윈도우 크기:</span>
                      <div className="period-btn-group">
                        {[{k:'1d',l:'1일'},{k:'5d',l:'5일'},{k:'1m',l:'1개월'},{k:'3m',l:'3개월'},{k:'6m',l:'6개월'},{k:'1y',l:'1년'}].map(w => (
                          <button key={w.k} className={`period-btn ${slidingWindow === w.k ? 'active' : ''}`}
                            onClick={() => setSlidingWindow(w.k)}>{w.l}</button>
                        ))}
                      </div>
                      {slidingData?.summary && (
                        <div style={{marginLeft:'auto',display:'flex',gap:'16px',alignItems:'center'}}>
                          <span style={{fontSize:'12px',color:'var(--text-secondary)'}}>검증 포인트: <b>{slidingData.summary.total_points}</b>건</span>
                          <span style={{fontSize:'12px',fontWeight:'700',color: slidingData.summary.hit_rate >= 50 ? '#059669' : '#DC2626'}}>
                            적중률: {slidingData.summary.hit_rate}%
                          </span>
                        </div>
                      )}
                    </div>
                    {slidingLoading ? <div className="loading" style={{padding:'16px'}}>분석 중...</div> : slidingData?.timeline?.length > 0 ? (
                      <>
                        <ResponsiveContainer width="100%" height={250}>
                          <LineChart data={slidingData.timeline} margin={{top:10,right:20,bottom:0,left:0}}>
                            <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                            <XAxis dataKey="date" tick={{fontSize:10,fill:'#94A3B8'}} axisLine={false} tickLine={false}
                              tickFormatter={v => v.slice(5)} interval="preserveStartEnd" />
                            <YAxis tick={{fontSize:10,fill:'#94A3B8'}} axisLine={false} tickLine={false} domain={['auto','auto']} />
                            <Tooltip content={({active,payload}) => {
                              if(!active||!payload?.length) return null;
                              const d = payload[0].payload;
                              return (
                                <div style={{background:'#fff',border:'1px solid #E2E8F0',borderRadius:'8px',padding:'10px 14px',boxShadow:'0 4px 12px rgba(0,0,0,0.1)',fontSize:'12px'}}>
                                  <div style={{fontWeight:'700',marginBottom:'4px'}}>{d.date}</div>
                                  <div>실제 사정률: <b>{d.actual_rate}%</b></div>
                                  <div>1순위 사정률: <b style={{color:'#059669'}}>{d.first_place_rate}%</b></div>
                                  <div>확정사정률: <b>{d.confirmed_rate}%</b> (차이: {d.diff}%)</div>
                                  <div style={{marginTop:'4px',fontWeight:'700',color:d.was_first_place?'#059669':'#DC2626'}}>
                                    {d.was_first_place ? '✓ 1순위 적중' : '✗ 미적중'}
                                  </div>
                                </div>
                              );
                            }} />
                            <Line type="monotone" dataKey="actual_rate" stroke="#0066CC" strokeWidth={2} dot={false} name="실제 사정률" />
                            <Line type="monotone" dataKey="first_place_rate" stroke="#059669" strokeWidth={1.5} dot={false} strokeDasharray="4 2" name="1순위 사정률" />
                            <Line type="monotone" dataKey="confirmed_rate" stroke="#DC2626" strokeWidth={1} dot={false} strokeDasharray="8 4" name="확정사정률" />
                          </LineChart>
                        </ResponsiveContainer>
                        <div style={{padding:'8px 16px',display:'flex',gap:'16px',fontSize:'11px',color:'var(--text-secondary)'}}>
                          <span><span style={{display:'inline-block',width:'12px',height:'2px',background:'#0066CC',marginRight:'4px',verticalAlign:'middle'}}></span>실제 사정률</span>
                          <span><span style={{display:'inline-block',width:'12px',height:'2px',background:'#059669',marginRight:'4px',verticalAlign:'middle',borderTop:'1px dashed #059669'}}></span>1순위 사정률</span>
                          <span><span style={{display:'inline-block',width:'12px',height:'2px',background:'#DC2626',marginRight:'4px',verticalAlign:'middle',borderTop:'1px dashed #DC2626'}}></span>확정사정률</span>
                        </div>
                      </>
                    ) : <div style={{color:'var(--text-secondary)',fontSize:'13px',padding:'16px'}}>검증 데이터가 부족합니다.</div>}
                  </div>
                )}

                {/* Phase 5: 연도별 낙찰확률 검증 */}
                {confirmedRate && yearlyData?.years?.length > 0 && (
                  <div className="card mb-16">
                    <div className="card-header">
                      <div>
                        <div className="card-title">연도별 낙찰확률 검증 (2020~2026)</div>
                        <div className="card-sub">확정사정률({confirmedRate}%)로 각 연도의 1순위 적중률 검증</div>
                      </div>
                    </div>
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={yearlyData.years} margin={{top:10,right:20,bottom:0,left:0}}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                        <XAxis dataKey="year" tick={{fontSize:12,fill:'#94A3B8'}} axisLine={false} tickLine={false} />
                        <YAxis tick={{fontSize:11,fill:'#94A3B8'}} axisLine={false} tickLine={false}
                          tickFormatter={v => v + '%'} domain={[0, 100]} />
                        <Tooltip formatter={(v,n) => [v + '%', '적중률']} />
                        <Bar dataKey="match_rate" radius={[4,4,0,0]} cursor="pointer"
                          onClick={(data) => setYearlyExpanded(yearlyExpanded === data.year ? null : data.year)}>
                          {yearlyData.years.map((entry, idx) => (
                            <Cell key={idx}
                              fill={entry.match_rate >= 60 ? '#059669' : entry.match_rate >= 30 ? '#F59E0B' : '#DC2626'}
                              opacity={yearlyExpanded === entry.year ? 1 : 0.8} />
                          ))}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                    <div style={{padding:'0 16px 12px'}}>
                      {yearlyData.years.map((yr, i) => (
                        <div key={i} style={{marginBottom:'4px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',cursor:'pointer',borderBottom:'1px solid #F1F5F9'}}
                            onClick={() => setYearlyExpanded(yearlyExpanded === yr.year ? null : yr.year)}>
                            <span style={{fontSize:'13px',fontWeight:'700',width:'50px'}}>{yr.year}년</span>
                            <div style={{flex:1,height:'6px',background:'#E2E8F0',borderRadius:'3px',overflow:'hidden'}}>
                              <div style={{width:`${yr.match_rate}%`,height:'100%',borderRadius:'3px',
                                background:yr.match_rate>=60?'#059669':yr.match_rate>=30?'#F59E0B':'#DC2626'}}></div>
                            </div>
                            <span style={{fontSize:'12px',fontWeight:'600',width:'80px',textAlign:'right',
                              color:yr.match_rate>=60?'#059669':yr.match_rate>=30?'#D97706':'#DC2626'}}>
                              {yr.match_rate}% ({yr.first_place_count}/{yr.total})
                            </span>
                            <span style={{fontSize:'11px',color:'#94A3B8'}}>{yearlyExpanded === yr.year ? '▲' : '▼'}</span>
                          </div>
                          {yearlyExpanded === yr.year && yr.cases?.length > 0 && (
                            <div style={{padding:'8px 0 8px 16px',fontSize:'12px'}}>
                              <table style={{width:'100%'}}>
                                <thead><tr style={{color:'var(--text-secondary)'}}>
                                  <th style={{textAlign:'left',padding:'4px 8px'}}>공고명</th>
                                  <th>발주기관</th><th>실제사정률</th><th>1순위사정률</th><th>날짜</th><th>적중</th>
                                </tr></thead>
                                <tbody>
                                  {yr.cases.map((c,j) => (
                                    <tr key={j}>
                                      <td style={{padding:'3px 8px',maxWidth:'180px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</td>
                                      <td style={{textAlign:'center',color:'var(--text-secondary)'}}>{c.org}</td>
                                      <td style={{textAlign:'center',fontWeight:'600'}}>{c.actual_rate}%</td>
                                      <td style={{textAlign:'center',color:'#059669',fontWeight:'600'}}>{c.first_place_rate}%</td>
                                      <td style={{textAlign:'center',color:'var(--text-secondary)'}}>{c.date}</td>
                                      <td style={{textAlign:'center'}}>
                                        {c.is_match ? <span className="match-yes">적중</span> : <span className="match-no">미적중</span>}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Past comparison table */}
                <div className="card">
                  <div className="card-header">
                    <div>
                      <div className="card-title">과거 비교 테이블</div>
                      <div className="card-sub">행 클릭 시 1순위 상태 확인</div>
                    </div>
                  </div>
                  {compPastTable.length > 0 ? (
                    <div className="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>공고명</th><th>발주기관</th><th>사정률</th><th>1순위사정률</th><th>낙찰금액</th><th>날짜</th><th>1순위</th>
                          </tr>
                        </thead>
                        <tbody>
                          {compPastTable.map((c, i) => (
                            <tr key={i} style={{cursor:'pointer'}}>
                              <td style={{fontWeight:'600',maxWidth:'200px'}}>{c.title}</td>
                              <td style={{fontSize:'12.5px',color:'var(--text-secondary)'}}>{c.org}</td>
                              <td><span style={{fontWeight:'700',color:'var(--primary)'}}>{c.rate}%</span></td>
                              <td><span style={{fontWeight:'700',color:'#059669'}}>{c.first_rank_rate || '-'}%</span></td>
                              <td style={{fontWeight:'600',textAlign:'right'}}>{c.amount ? fmtAmount(c.amount) : '-'}</td>
                              <td style={{fontSize:'12.5px',color:'var(--text-secondary)'}}>{c.date}</td>
                              <td>
                                {c.is_first_rank
                                  ? <span className="match-yes">1순위</span>
                                  : <span className="match-no">-</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : <div style={{color:'var(--text-secondary)',fontSize:'13px',padding:'12px 0'}}>비교 데이터가 없습니다.</div>}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Page 3: 관리자 ────────────────────────────────────────────────────────────
function AdminPage() {
  const [admin, setAdmin] = useState(null);
  const [nasStatus, setNasStatus] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [userSearch, setUserSearch] = useState('');
  const addToast = useToast();

  const loadAdmin = () => {
    fetch(`${API}/admin/dashboard`).then(r => r.json()).then(setAdmin);
  };
  const loadNas = () => {
    fetch(`${API}/admin/nas-status`).then(r => r.json()).then(setNasStatus).catch(() => setNasStatus(null));
  };
  useEffect(() => { loadAdmin(); loadNas(); }, []);

  const handleSync = () => {
    setSyncing(true);
    fetch(`${API}/admin/sync`, { method: 'POST' })
      .then(r => r.json())
      .then(d => { addToast(`${d.message} (${d.records}건)`, 'success'); loadAdmin(); })
      .catch(() => addToast('수집 실패', 'error'))
      .finally(() => setSyncing(false));
  };

  if (!admin) return <div className="loading">관리자 데이터 로딩 중...</div>;

  const filteredUsers = (admin.users || []).filter(u =>
    u.name.includes(userSearch) || u.email.includes(userSearch)
  );

  return (
    <div>
      <div className="grid-4 mb-16" style={{gridTemplateColumns: nasStatus ? 'repeat(5, 1fr)' : 'repeat(4, 1fr)'}}>
        {[
          { label: '전체 사용자', value: `${admin.total_users}명` },
          { label: '프리미엄 구독', value: `${admin.premium_users}명` },
          { label: '수집 공고 총계', value: `${admin.total_announcements?.toLocaleString()}건` },
          { label: '낙찰결과 총계', value: `${admin.total_results?.toLocaleString()}건` },
        ].map((k, i) => (
          <div key={i} className="kpi-card">
            <div className="kpi-label">{k.label}</div>
            <div className="kpi-value">{k.value}</div>
          </div>
        ))}
        {/* NAS Status Card */}
        {nasStatus && (
          <div className="kpi-card">
            <div className="kpi-label">NAS 상태</div>
            <div style={{display:'flex',alignItems:'center',gap:'8px',marginTop:'6px'}}>
              <div className={`nas-dot ${nasStatus.status === 'online' ? 'online' : 'offline'}`}></div>
              <span style={{fontSize:'16px',fontWeight:'800',color: nasStatus.status === 'online' ? '#059669' : '#DC2626'}}>
                {nasStatus.status === 'online' ? '정상' : '오프라인'}
              </span>
            </div>
            {nasStatus.disk_usage && (
              <div style={{fontSize:'11px',color:'var(--text-secondary)',marginTop:'4px'}}>
                사용량: {nasStatus.disk_usage}%
              </div>
            )}
          </div>
        )}
      </div>
      <div className="mb-16">
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">데이터 파이프라인 현황</div><div className="card-sub">실시간 배치 상태</div></div>
            <button className="btn btn-primary" disabled={syncing} onClick={handleSync}>
              {syncing ? '수집 중...' : '수동 수집'}
            </button>
          </div>
          {(admin.pipelines || []).map((p, i) => (
            <div key={i} className="pipeline-row">
              <span className={`dot ${p.status === 'success' ? 'dot-green' : p.status === 'running' ? 'dot-amber' : 'dot-red'}`}></span>
              <div style={{flex:1}}>
                <div className="pipeline-name">{p.name}</div>
                <div className="pipeline-time">마지막 실행: {p.last} &middot; {p.count}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="card">
        <div className="card-header">
          <div><div className="card-title">사용자 목록</div></div>
          <input className="search-input" style={{flex:'none',minWidth:'180px'}} placeholder="이름/이메일 검색"
            value={userSearch} onChange={e => setUserSearch(e.target.value)} />
        </div>
        <table>
          <thead><tr><th>이름</th><th>이메일</th><th>플랜</th><th>가입일</th><th>마지막 접속</th><th>조회 횟수</th></tr></thead>
          <tbody>
            {filteredUsers.map((u, i) => (
              <tr key={i}>
                <td style={{fontWeight:'600'}}>{u.name}</td>
                <td style={{fontSize:'12.5px',color:'var(--text-secondary)'}}>{u.email}</td>
                <td>
                  <span className={`badge ${u.plan === '프리미엄' ? 'badge-blue' : u.plan === '스탠다드' ? 'badge-green' : 'badge-amber'}`}>{u.plan}</span>
                </td>
                <td style={{fontSize:'12.5px',color:'var(--text-secondary)'}}>{u.joined}</td>
                <td style={{fontSize:'12.5px'}}>{u.last}</td>
                <td style={{fontWeight:'700'}}>{u.queries}회</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Auth Context ──────────────────────────────────────────────────────────────
const AuthContext = createContext();
function useAuth() { return useContext(AuthContext); }

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(localStorage.getItem('token'));
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (token) {
      fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(u => { setUser(u); setLoading(false); })
        .catch(() => { localStorage.removeItem('token'); setToken(null); setUser(null); setLoading(false); });
    } else {
      setLoading(false);
    }
  }, [token]);

  const login = async (username, password) => {
    const r = await fetch(`${API}/auth/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '로그인 실패'); }
    const data = await r.json();
    localStorage.setItem('token', data.access_token);
    setToken(data.access_token);
    setUser(data.user);
    return data;
  };

  const register = async (username, email, password, name) => {
    const params = new URLSearchParams({ username, email, password, ...(name ? { name } : {}) });
    const r = await fetch(`${API}/auth/register?${params}`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '회원가입 실패'); }
    const data = await r.json();
    localStorage.setItem('token', data.access_token);
    setToken(data.access_token);
    setUser(data.user);
    return data;
  };

  const logout = () => {
    localStorage.removeItem('token');
    setToken(null);
    setUser(null);
  };

  const authHeaders = () => token ? { Authorization: `Bearer ${token}` } : {};

  return (
    <AuthContext.Provider value={{ user, token, loading, login, register, logout, authHeaders }}>
      {children}
    </AuthContext.Provider>
  );
}

// ── Login Page ───────────────────────────────────────────────────────────────
function LoginPage({ onSwitch }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const { login } = useAuth();

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try { await login(username, password); }
    catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'linear-gradient(135deg,#1E3A5F 0%,#0066CC 100%)'}}>
      <div style={{background:'#fff',borderRadius:'16px',padding:'48px 40px',width:'400px',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{textAlign:'center',marginBottom:'32px'}}>
          <div style={{fontSize:'32px',marginBottom:'8px'}}>📡</div>
          <h1 style={{fontSize:'22px',fontWeight:'800',color:'#0F172A',margin:'0 0 4px'}}>입찰 인사이트</h1>
          <p style={{fontSize:'13px',color:'#64748B'}}>조달 입찰 사정률 분석 플랫폼</p>
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{marginBottom:'16px'}}>
            <label style={{display:'block',fontSize:'13px',fontWeight:'600',color:'#374151',marginBottom:'6px'}}>아이디</label>
            <input type="text" value={username} onChange={e => setUsername(e.target.value)}
              placeholder="아이디 입력" required
              style={{width:'100%',padding:'10px 14px',border:'1px solid #D1D5DB',borderRadius:'8px',fontSize:'14px',outline:'none'}} />
          </div>
          <div style={{marginBottom:'20px'}}>
            <label style={{display:'block',fontSize:'13px',fontWeight:'600',color:'#374151',marginBottom:'6px'}}>비밀번호</label>
            <input type="password" value={password} onChange={e => setPassword(e.target.value)}
              placeholder="비밀번호 입력" required
              style={{width:'100%',padding:'10px 14px',border:'1px solid #D1D5DB',borderRadius:'8px',fontSize:'14px',outline:'none'}} />
          </div>
          {error && <div style={{color:'#DC2626',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{width:'100%',padding:'12px',background:'#0066CC',color:'#fff',border:'none',borderRadius:'8px',fontSize:'15px',fontWeight:'700',cursor:'pointer',opacity: loading ? 0.7 : 1}}>
            {loading ? '로그인 중...' : '로그인'}
          </button>
        </form>
        <div style={{textAlign:'center',marginTop:'20px',fontSize:'13px',color:'#64748B'}}>
          계정이 없으신가요?{' '}
          <span onClick={onSwitch} style={{color:'#0066CC',cursor:'pointer',fontWeight:'600'}}>회원가입</span>
        </div>
        <div style={{textAlign:'center',marginTop:'12px',fontSize:'11px',color:'#94A3B8'}}>
          데모 계정: admin / demo1234
        </div>
      </div>
    </div>
  );
}

// ── Register Page ────────────────────────────────────────────────────────────
function RegisterPage({ onSwitch }) {
  const [form, setForm] = useState({ username: '', email: '', password: '', confirmPw: '', name: '' });
  const [error, setError] = useState('');
  const [loading, setLoading] = useState(false);
  const { register } = useAuth();

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    if (form.password !== form.confirmPw) { setError('비밀번호가 일치하지 않습니다.'); return; }
    if (form.password.length < 6) { setError('비밀번호는 6자 이상이어야 합니다.'); return; }
    setLoading(true);
    try { await register(form.username, form.email, form.password, form.name); }
    catch (err) { setError(err.message); }
    finally { setLoading(false); }
  };

  const set = (k) => (e) => setForm({ ...form, [k]: e.target.value });
  const inputStyle = {width:'100%',padding:'10px 14px',border:'1px solid #D1D5DB',borderRadius:'8px',fontSize:'14px',outline:'none'};
  const labelStyle = {display:'block',fontSize:'13px',fontWeight:'600',color:'#374151',marginBottom:'6px'};

  return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'linear-gradient(135deg,#1E3A5F 0%,#0066CC 100%)'}}>
      <div style={{background:'#fff',borderRadius:'16px',padding:'48px 40px',width:'420px',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
        <div style={{textAlign:'center',marginBottom:'28px'}}>
          <h1 style={{fontSize:'22px',fontWeight:'800',color:'#0F172A',margin:'0 0 4px'}}>회원가입</h1>
          <p style={{fontSize:'13px',color:'#64748B'}}>새 계정을 만들어 시작하세요</p>
        </div>
        <form onSubmit={handleSubmit}>
          {[
            { key: 'username', label: '아이디', ph: '아이디 입력', type: 'text' },
            { key: 'name', label: '이름', ph: '이름 입력', type: 'text' },
            { key: 'email', label: '이메일', ph: 'email@example.com', type: 'email' },
            { key: 'password', label: '비밀번호', ph: '6자 이상', type: 'password' },
            { key: 'confirmPw', label: '비밀번호 확인', ph: '비밀번호 재입력', type: 'password' },
          ].map(f => (
            <div key={f.key} style={{marginBottom:'14px'}}>
              <label style={labelStyle}>{f.label}</label>
              <input type={f.type} value={form[f.key]} onChange={set(f.key)}
                placeholder={f.ph} required={f.key !== 'name'} style={inputStyle} />
            </div>
          ))}
          {error && <div style={{color:'#DC2626',fontSize:'13px',marginBottom:'12px',textAlign:'center'}}>{error}</div>}
          <button type="submit" disabled={loading}
            style={{width:'100%',padding:'12px',background:'#0066CC',color:'#fff',border:'none',borderRadius:'8px',fontSize:'15px',fontWeight:'700',cursor:'pointer',opacity: loading ? 0.7 : 1}}>
            {loading ? '처리 중...' : '가입하기'}
          </button>
        </form>
        <div style={{textAlign:'center',marginTop:'20px',fontSize:'13px',color:'#64748B'}}>
          이미 계정이 있으신가요?{' '}
          <span onClick={onSwitch} style={{color:'#0066CC',cursor:'pointer',fontWeight:'600'}}>로그인</span>
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
const PAGES = [
  { id: 'announcements', label: '공고화면', icon: '', section: '분석' },
  { id: 'comprehensive', label: '종합화면', icon: '', section: '분석' },
  { id: 'admin', label: '관리자', icon: '', section: '시스템', adminOnly: true },
];

function App() {
  const { user, loading: authLoading, logout } = useAuth();
  const [authPage, setAuthPage] = useState('login');
  const [page, setPage] = useState('announcements');
  const [selectedAnnouncement, setSelectedAnnouncement] = useState(null);
  const [syncingTopbar, setSyncingTopbar] = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const addToast = useToast();

  if (authLoading) {
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#F0F4F8'}}>
      <div className="loading">로딩 중...</div>
    </div>;
  }

  if (!user) {
    return authPage === 'login'
      ? <LoginPage onSwitch={() => setAuthPage('register')} />
      : <RegisterPage onSwitch={() => setAuthPage('login')} />;
  }

  const visiblePages = PAGES.filter(p => !p.adminOnly || user.role === 'admin');
  const sections = [...new Set(visiblePages.map(p => p.section))];
  const current = visiblePages.find(p => p.id === page);

  const handleTopbarSync = () => {
    setSyncingTopbar(true);
    fetch(`${API}/admin/sync`, { method: 'POST' })
      .then(r => r.json())
      .then(d => addToast(`${d.message} (${d.records}건)`, 'success'))
      .catch(() => addToast('수집 실패', 'error'))
      .finally(() => setSyncingTopbar(false));
  };

  const handleSelectAnnouncement = (announcement) => {
    setSelectedAnnouncement(announcement);
    setPage('comprehensive');
  };

  const renderPage = () => {
    switch(page) {
      case 'announcements': return <AnnouncementPage onSelectAnnouncement={handleSelectAnnouncement} />;
      case 'comprehensive': return <ComprehensivePage announcement={selectedAnnouncement} />;
      case 'admin': return user.role === 'admin' ? <AdminPage /> : null;
      default: return null;
    }
  };

  return (
    <div className="layout">
      {mobileMenuOpen && <div className="mobile-overlay" onClick={() => setMobileMenuOpen(false)}></div>}
      <aside className={`sidebar ${sidebarCollapsed ? 'collapsed' : ''} ${mobileMenuOpen ? 'mobile-open' : ''}`}>
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-icon">📡</div>
            <div className="logo-text">
              <div>입찰 인사이트</div>
              <div className="logo-sub">조달 입찰 분석 플랫폼</div>
            </div>
          </div>
          <button className="sidebar-toggle" onClick={() => { setSidebarCollapsed(c => !c); setMobileMenuOpen(false); }}
            title={sidebarCollapsed ? '사이드바 펼치기' : '사이드바 접기'}>
            {sidebarCollapsed ? '▶' : '◀'}
          </button>
        </div>
        {visiblePages.map(p => (
          <div key={p.id} style={{padding:'2px 8px'}}>
            <button className={`nav-item ${page === p.id ? 'active' : ''}`}
              onClick={() => { setPage(p.id); setMobileMenuOpen(false); }}
              title={p.label}>
              <span className="nav-icon">{p.icon}</span>
              <span>{p.label}</span>
            </button>
          </div>
        ))}
        <div className="sidebar-bottom">
          <div className="user-badge">
            <div className="avatar">{(user.name || user.username || '?')[0]}</div>
            <div className="user-info" style={{flex:1}}>
              <div className="name">{user.name || user.username}</div>
              <div className="plan">{user.plan || '무료'} 플랜</div>
            </div>
            <button onClick={logout} title="로그아웃"
              style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:'13px',padding:'4px'}}>
              ↪
            </button>
          </div>
        </div>
      </aside>
      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <button className="mobile-menu-btn" onClick={() => setMobileMenuOpen(true)}
              style={{background:'none',border:'none',fontSize:'20px',cursor:'pointer',padding:'4px'}}>☰</button>
            <div className="topbar-title">{current?.label}</div>
          </div>
          <div className="topbar-right">
            <span className="badge badge-green" style={{fontSize:'10px'}}>● 연결됨</span>
            {user.role === 'admin' && (
              <button className="btn btn-primary btn-sm" disabled={syncingTopbar} onClick={handleTopbarSync}>
                {syncingTopbar ? '수집 중...' : '수동 수집'}
              </button>
            )}
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><ToastProvider><App /></ToastProvider></AuthProvider>
);
</script>
</body>
</html>
