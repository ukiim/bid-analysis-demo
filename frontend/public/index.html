                            <YAxis tick={{fontSize:10,fill:'#94A3B8'}} axisLine={false} tickLine={false} domain={['auto','auto']} />
                            <Tooltip content={({active,payload}) => {
                              if(!active||!payload?.length) return null;
                              const d = payload[0].payload;
                              return (
                                <div style={{background:'#fff',border:'1px solid #E2E8F0',borderRadius:'8px',padding:'10px 14px',boxShadow:'0 4px 12px rgba(0,0,0,0.1)',fontSize:'12px'}}>
                                  <div className="bold-mb-4">{d.date}</div>
                                  <div>실제 사정률: <b>{d.actual_rate}%</b></div>
                                  <div>1순위 사정률: <b style={{color:'#059669'}}>{d.first_place_rate}%</b></div>
                                  <div>확정사정률: <b>{d.confirmed_rate}%</b> (차이: {d.diff}%)</div>
                                  <div style={{marginTop:'4px',fontWeight:'700',color:d.was_first_place?'#059669':'#DC2626'}}>
                                    {d.was_first_place
                                      ? (<span className="inline-row"><Icon name="check" size={12} />1순위 적중</span>)
                                      : (<span className="inline-row"><Icon name="close" size={12} />미적중</span>)}
                                  </div>
                                </div>
                              );
                            }} />
                            <Line type="monotone" dataKey="actual_rate" stroke="#0066CC" strokeWidth={2} dot={false} name="실제 사정률" />
                            <Line type="monotone" dataKey="first_place_rate" stroke="#059669" strokeWidth={1.5} dot={false} strokeDasharray="4 2" name="1순위 사정률" />
                            <Line type="monotone" dataKey="confirmed_rate" stroke="#DC2626" strokeWidth={1} dot={false} strokeDasharray="8 4" name="확정사정률" />
                          </LineChart>
                        </ResponsiveContainer>
                        <div style={{padding:'8px 16px',display:'flex',gap:'16px',fontSize:'11px',color:'var(--text-secondary)'}}>
                          <span><span style={{display:'inline-block',width:'12px',height:'2px',background:'#0066CC',marginRight:'4px',verticalAlign:'middle'}}></span>실제 사정률</span>
                          <span><span style={{display:'inline-block',width:'12px',height:'2px',background:'#059669',marginRight:'4px',verticalAlign:'middle',borderTop:'1px dashed #059669'}}></span>1순위 사정률</span>
                          <span><span style={{display:'inline-block',width:'12px',height:'2px',background:'#DC2626',marginRight:'4px',verticalAlign:'middle',borderTop:'1px dashed #DC2626'}}></span>확정사정률</span>
                        </div>
                      </>
                    ) : <div style={{color:'var(--text-secondary)',fontSize:'13px',padding:'16px'}}>검증 데이터가 부족합니다.</div>}
                  </div>
                )}

                {/* Phase 5: 연도별 낙찰확률 검증 */}
                {confirmedRate && yearlyData?.years?.length > 0 && (
                  <div className="card mb-16">
                    <div className="card-header">
                      <div>
                        <div className="card-title">연도별 낙찰확률 검증 (2020~2026)</div>
                        <div className="card-sub">확정사정률({confirmedRate}%)로 각 연도의 1순위 적중률 검증</div>
                      </div>
                    </div>
                    <ResponsiveContainer width="100%" height={200}>
                      <BarChart data={yearlyData.years} margin={{top:10,right:20,bottom:0,left:0}}>
                        <CartesianGrid strokeDasharray="3 3" stroke="#F1F5F9" />
                        <XAxis dataKey="year" tick={{fontSize:12,fill:'#94A3B8'}} axisLine={false} tickLine={false} />
                        <YAxis tick={{fontSize:11,fill:'#94A3B8'}} axisLine={false} tickLine={false}
                          tickFormatter={v => v + '%'} domain={[0, 100]} />
                        <Tooltip formatter={(v,n) => [v + '%', '적중률']} />
                        <Bar dataKey="match_rate" radius={[4,4,0,0]} cursor="pointer"
                          onClick={(data) => setYearlyExpanded(yearlyExpanded === data.year ? null : data.year)}>
                          {yearlyData.years.map((entry, idx) => (
                            <Cell key={idx}
                              fill={entry.match_rate >= 60 ? '#059669' : entry.match_rate >= 30 ? '#F59E0B' : '#DC2626'}
                              opacity={yearlyExpanded === entry.year ? 1 : 0.8} />
                          ))}
                        </Bar>
                      </BarChart>
                    </ResponsiveContainer>
                    <div style={{padding:'0 16px 12px'}}>
                      {yearlyData.years.map((yr, i) => (
                        <div key={i} style={{marginBottom:'4px'}}>
                          <div style={{display:'flex',alignItems:'center',gap:'8px',padding:'6px 0',cursor:'pointer',borderBottom:'1px solid #F1F5F9'}}
                            onClick={() => setYearlyExpanded(yearlyExpanded === yr.year ? null : yr.year)}>
                            <span style={{fontSize:'13px',fontWeight:'700',width:'50px'}}>{yr.year}년</span>
                            <div style={{flex:1,height:'6px',background:'#E2E8F0',borderRadius:'3px',overflow:'hidden'}}>
                              <div style={{width:`${yr.match_rate}%`,height:'100%',borderRadius:'3px',
                                background:yr.match_rate>=60?'#059669':yr.match_rate>=30?'#F59E0B':'#DC2626'}}></div>
                            </div>
                            <span style={{fontSize:'12px',fontWeight:'600',width:'80px',textAlign:'right',
                              color:yr.match_rate>=60?'#059669':yr.match_rate>=30?'#D97706':'#DC2626'}}>
                              {yr.match_rate}% ({yr.first_place_count}/{yr.total})
                            </span>
                            <span style={{fontSize:'11px',color:'#94A3B8'}}>{yearlyExpanded === yr.year ? '▲' : '▼'}</span>
                          </div>
                          {yearlyExpanded === yr.year && yr.cases?.length > 0 && (
                            <div style={{padding:'8px 0 8px 16px',fontSize:'12px'}}>
                              <table style={{width:'100%'}}>
                                <thead><tr className="text-muted">
                                  <th style={{textAlign:'left',padding:'4px 8px'}}>공고명</th>
                                  <th>발주기관</th><th>실제사정률</th><th>1순위사정률</th><th>날짜</th><th>적중</th>
                                </tr></thead>
                                <tbody>
                                  {yr.cases.map((c,j) => (
                                    <tr key={j}>
                                      <td style={{padding:'3px 8px',maxWidth:'180px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.title}</td>
                                      <td style={{textAlign:'center',color:'var(--text-secondary)'}}>{c.org}</td>
                                      <td style={{textAlign:'center',fontWeight:'600'}}>{c.actual_rate}%</td>
                                      <td style={{textAlign:'center',color:'#059669',fontWeight:'600'}}>{c.first_place_rate}%</td>
                                      <td style={{textAlign:'center',color:'var(--text-secondary)'}}>{c.date}</td>
                                      <td className="text-center">
                                        {c.is_match ? <span className="match-yes">적중</span> : <span className="match-no">미적중</span>}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* Past comparison table */}
                <div className="card">
                  <div className="card-header">
                    <div>
                      <div className="card-title">과거 비교 테이블</div>
                      <div className="card-sub">행 클릭 시 1순위 상태 확인</div>
                    </div>
                  </div>
                  {compPastTable.length > 0 ? (
                    <div className="table-wrap">
                      <table>
                        <thead>
                          <tr>
                            <th>공고명</th><th>발주기관</th><th>사정률</th><th>1순위사정률</th><th>낙찰금액</th><th>날짜</th><th>1순위</th>
                          </tr>
                        </thead>
                        <tbody>
                          {compPastTable.map((c, i) => (
                            <tr key={i} style={{cursor:'pointer'}}>
                              <td className="max-w-200-bold">{c.title}</td>
                              <td className="text-md-half-muted">{c.org}</td>
                              <td><span className="text-rate">{c.rate}%</span></td>
                              <td><span className="text-success-bold">{c.first_rank_rate || '-'}%</span></td>
                              <td style={{fontWeight:'600',textAlign:'right'}}>{c.amount ? fmtAmount(c.amount) : '-'}</td>
                              <td className="text-md-half-muted">{c.date}</td>
                              <td>
                                {c.is_first_rank
                                  ? <span className="match-yes">1순위</span>
                                  : <span className="match-no">-</span>}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : <div className="empty-message">비교 데이터가 없습니다.</div>}
                </div>
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Page: 마이페이지 ──────────────────────────────────────────────────────────
function MyPage() {
  const { user, authFetch } = useAuth();
  const addToast = useToast();
  const [currentPw, setCurrentPw] = useState('');
  const [newPw, setNewPw] = useState('');
  const [confirmPw, setConfirmPw] = useState('');
  const [pwLoading, setPwLoading] = useState(false);
  const [history, setHistory] = useState([]);
  const [historyPage, setHistoryPage] = useState(1);
  const [historyTotal, setHistoryTotal] = useState(0);
  const [historyLoading, setHistoryLoading] = useState(true);
  const [predSettings, setPredSettings] = useState(null);

  const loadHistory = (pg = 1) => {
    setHistoryLoading(true);
    apiGet(`/history?page=${pg}&page_size=10`)
      .then(d => { setHistory(d.items || []); setHistoryTotal(d.total || 0); setHistoryPage(pg); })
      .catch(() => {})
      .finally(() => setHistoryLoading(false));
  };

  const loadPredSettings = () => {
    apiGet(`/users/me/prediction-settings`).then(setPredSettings).catch(() => {});
  };

  const resetPredSettings = () => {
    if (!confirm('저장된 예측 설정을 초기값으로 되돌립니다. 진행할까요?')) return;
    authFetch(`${API}/users/me/prediction-settings`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        period_months: 6, category_filter: 'same',
        bucket_mode: 'A', detail_rule: 'max_gap',
        rate_range_start: null, rate_range_end: null, confirmed_rate: null,
      }),
    }).then(r => r.ok ? r.json() : null)
      .then(() => { addToast('예측 설정 초기화 완료', 'success'); loadPredSettings(); });
  };

  useEffect(() => { loadHistory(); loadPredSettings(); }, []);

  const handleChangePw = () => {
    if (!currentPw || !newPw) return addToast('현재 비밀번호와 새 비밀번호를 입력해주세요.', 'error');
    if (newPw.length < 6) return addToast('새 비밀번호는 6자 이상이어야 합니다.', 'error');
    if (newPw !== confirmPw) return addToast('새 비밀번호가 일치하지 않습니다.', 'error');
    setPwLoading(true);
    apiSend('PUT', `/auth/password?current_password=${encodeURIComponent(currentPw)}&new_password=${encodeURIComponent(newPw)}`)
      .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail); }); return r.json(); })
      .then(() => { addToast('비밀번호가 변경되었습니다.', 'success'); setCurrentPw(''); setNewPw(''); setConfirmPw(''); })
      .catch(e => addToast(e.message, 'error'))
      .finally(() => setPwLoading(false));
  };

  const totalPages = Math.ceil(historyTotal / 10);

  return (
    <div className="col-stack-20">
      <div className="card">
        <div className="card-header"><div className="card-title">프로필 정보</div></div>
        <div style={{padding:'20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
          <div>
            <div className="info-row">이메일</div>
            <div className="text-md">{user.email}</div>
          </div>
          <div>
            <div className="info-row">가입일</div>
            <div className="text-md">{user.joined_at || '-'}</div>
          </div>
          <div>
            <div className="info-row">역할</div>
            <div className="text-md">{user.role === 'admin' ? '관리자' : '일반 사용자'}</div>
          </div>
          <div>
            <div className="info-row">분석 횟수</div>
            <div className="text-md">{user.query_count || 0}회</div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><div className="card-title">비밀번호 변경</div></div>
        <div style={{padding:'20px',display:'flex',flexDirection:'column',gap:'12px',maxWidth:'400px'}}>
          <input type="password" className="search-input" placeholder="현재 비밀번호"
            value={currentPw} onChange={e => setCurrentPw(e.target.value)} />
          <input type="password" className="search-input" placeholder="새 비밀번호 (6자 이상)"
            value={newPw} onChange={e => setNewPw(e.target.value)} />
          <input type="password" className="search-input" placeholder="새 비밀번호 확인"
            value={confirmPw} onChange={e => setConfirmPw(e.target.value)} />
          <button className="btn btn-primary" onClick={handleChangePw} disabled={pwLoading}
            style={{alignSelf:'flex-start'}}>
            {pwLoading ? '변경 중...' : '비밀번호 변경'}
          </button>
        </div>
      </div>

      <div className="card">
        <div className="card-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div className="card-title">예측 설정 (자동 적용)</div>
            <div className="card-sub">다음 공고 진입 시 마지막 옵션 자동 적용</div>
          </div>
          {predSettings?.exists && (
            <button className="btn btn-outline btn-sm" 
              onClick={resetPredSettings}>초기값으로 되돌리기</button>
          )}
        </div>
        <div className="pad-20">
          {!predSettings ? (
            <div className="text-md-muted">로딩 중...</div>
          ) : !predSettings.exists ? (
            <div className="text-md-muted">
              아직 저장된 설정이 없습니다. 옵션 변경 후 학습 저장 버튼을 눌러 저장하세요.
            </div>
          ) : (
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:'14px'}}>
              {[
                ['분석 기간', `${predSettings.period_months}개월`],
                ['분류', { same:'현재 카테고리', construction:'공사', service:'용역', industry:'동일 업종', all:'전체' }[predSettings.category_filter] || predSettings.category_filter],
                ['활성 모드', { A:'A 빈도최대', B:'B 공백', C:'C 차이최대' }[predSettings.bucket_mode]],
                ['세부값 룰', { first_after:'첫값 바로 뒤', last_after:'마지막값 바로 뒤', max_gap:'간격 최대값' }[predSettings.detail_rule]],
                ['분석 범위', predSettings.rate_range_start != null ? `${predSettings.rate_range_start}% ~ ${predSettings.rate_range_end}%` : '-'],
                ['확정 사정률', predSettings.confirmed_rate != null ? `${predSettings.confirmed_rate}%` : '-'],
              ].map(([k, v]) => (
                <div key={k}>
                  <div className="info-row">{k}</div>
                  <div className="text-md">{v}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div>
            <div className="card-title">분석 이력</div>
            <div className="card-sub">총 {historyTotal}건</div>
          </div>
        </div>
        {historyLoading ? <SkeletonTable rows={5} cols={5} /> : (
          <div className="table-wrap">
            <table>
              <thead>
                <tr><th>분석 일시</th><th>공고명</th><th>분석 유형</th><th>결과 요약</th></tr>
              </thead>
              <tbody>
                {history.length === 0 ? (
                  <tr><td colSpan={4} className="empty-pad-32">분석 이력이 없습니다.</td></tr>
                ) : history.map(h => (
                  <tr key={h.id}>
                    <td className="text-sm-muted-nowrap">{h.queried_at}</td>
                    <td style={{maxWidth:'300px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.announcement_title || '-'}</td>
                    <td><span className="badge badge-blue">{h.analysis_type === 'frequency' ? '빈도분석' : h.analysis_type === 'company' ? '갭분석' : h.analysis_type === 'comprehensive' ? '종합분석' : h.analysis_type}</span></td>
                    <td className="text-sm-muted">
                      {h.result_summary ? (h.result_summary.confirmed_rate ? `확정 ${h.result_summary.confirmed_rate}%` : h.result_summary.peak_rate ? `피크 ${h.result_summary.peak_rate}%` : '-') : '-'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
        {totalPages > 1 && (
          <div className="pagination">
            <button className="page-btn" disabled={historyPage <= 1} onClick={() => loadHistory(historyPage - 1)}>이전</button>
            <span className="text-sm-muted">{historyPage} / {totalPages}</span>
            <button className="page-btn" disabled={historyPage >= totalPages} onClick={() => loadHistory(historyPage + 1)}>다음</button>
          </div>
        )}
      </div>
    </div>
  );
}


// ── Page: 데이터 업로드 ────────────────────────────────────────────────────────
function DataUploadPage() {
  const { authFetch } = useAuth();
  const addToast = useToast();
  const [uploading, setUploading] = useState(false);
  const [uploadResult, setUploadResult] = useState(null);
  const [uploads, setUploads] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);

  const loadUploads = () => {
    apiGet(`/data/uploads`).then(setUploads).catch(() => {});
  };
  useEffect(() => { loadUploads(); }, []);

  const handleUpload = (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['csv', 'xlsx', 'xls'].includes(ext)) {
      return addToast('지원하지 않는 파일 형식입니다. (CSV, Excel만 가능)', 'error');
    }
    setUploading(true);
    setUploadResult(null);
    const formData = new FormData();
    formData.append('file', file);
    authFetch(`${API}/data/upload`, { method: 'POST', body: formData })
      .then(r => { if (!r.ok) return r.json().then(e => { throw new Error(e.detail); }); return r.json(); })
      .then(d => { setUploadResult({ success: true, message: d.message }); addToast(d.message, 'success'); loadUploads(); })
      .catch(e => { setUploadResult({ success: false, message: e.message }); addToast(e.message, 'error'); })
      .finally(() => setUploading(false));
  };

  const onDrop = (e) => { e.preventDefault(); setDragOver(false); const file = e.dataTransfer?.files?.[0]; if (file) handleUpload(file); };
  const onDragOver = (e) => { e.preventDefault(); setDragOver(true); };
  const onDragLeave = () => setDragOver(false);

  // 샘플 CSV 다운로드 (필수 컬럼 + 샘플 1행)
  const downloadSampleCsv = () => {
    const csv = '﻿' + [
      '공고번호,공고명,발주기관,기초금액,사정률,낙찰금액,개찰일',
      'TEST-2026-0001,샘플 공사 안내,서울특별시,1000000000,99.45,994500000,2026-04-15',
    ].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'bidstar_sample.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div className="col-stack-20">
      <div className="card">
        <div className="card-header flex-between" >
          <div>
            <div className="card-title">파일 업로드</div>
            <div className="card-sub">업로드 즉시 분석에 반영</div>
          </div>
          <button className="btn btn-outline btn-sm"
            onClick={downloadSampleCsv}><Icon name="download" size={12} /> 샘플 CSV 다운로드</button>
        </div>
        <div className="pad-20">
          {/* 필수 컬럼 가이드 */}
          <div style={{
            marginBottom:'14px',padding:'12px 14px',background:'#F8FAFC',
            border:'1px solid #E2E8F0',borderRadius:'8px',
          }}>
            <div style={{fontSize:'12px',fontWeight:'700',color:'var(--text-secondary)',marginBottom:'6px'}}>
              필수 컬럼 (헤더 일치 필수)
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:'6px'}}>
              {['공고번호','공고명','발주기관','기초금액','사정률','낙찰금액','개찰일'].map(c => (
                <span key={c} style={{
                  fontSize:'12px',padding:'3px 8px',background:'#fff',
                  border:'1px solid var(--border)',borderRadius:'4px',
                  color:'var(--primary-dark)',fontWeight:500,
                }}>{c}</span>
              ))}
            </div>
            <div style={{fontSize:'11px',color:'var(--text-secondary)',marginTop:'6px'}}>
              · 사정률은 % 단위 (예: 99.45) · 금액은 원 단위 (예: 1,000,000,000) · 개찰일 형식: YYYY-MM-DD
            </div>
          </div>

          <div
            onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
            onClick={() => fileInputRef.current?.click()}
            style={{
              border: `2px dashed ${dragOver ? 'var(--primary)' : 'var(--border)'}`,
              borderRadius: '12px', padding: '48px 20px', textAlign: 'center', cursor: 'pointer',
              background: dragOver ? '#EFF6FF' : '#FAFBFC', transition: 'all 0.2s',
            }}>
            <div style={{display:'inline-flex',marginBottom:'12px',color:'var(--text-muted)'}}><Icon name="folder" size={36} /></div>
            <div style={{fontSize:'14px',fontWeight:600,marginBottom:'4px'}}>파일을 드래그하거나 클릭하여 선택</div>
            <div className="text-sm-muted">지원 형식: Excel(.xlsx), CSV(.csv) · 최대 100MB</div>
          </div>
          <input ref={fileInputRef} type="file" accept=".csv,.xlsx,.xls" style={{display:'none'}}
            onChange={e => { handleUpload(e.target.files?.[0]); e.target.value = ''; }} />
          {uploading && <div style={{marginTop:'12px',fontSize:'13px',color:'var(--primary)'}}>업로드 중...</div>}
          {uploadResult && (
            <div style={{marginTop:'12px',padding:'12px 16px',borderRadius:'8px',fontSize:'13px',
              background: uploadResult.success ? '#F0FDF4' : '#FEF2F2',
              color: uploadResult.success ? '#065F46' : '#991B1B'}}>
              {uploadResult.message}
            </div>
          )}
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <div className="card-title">업로드 이력</div>
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr><th>업로드 일시</th><th>파일명</th><th>건수</th><th>상태</th></tr>
            </thead>
            <tbody>
              {uploads.length === 0 ? (
                <tr><td colSpan={4} className="empty-pad-32">업로드 이력이 없습니다.</td></tr>
              ) : uploads.map(u => (
                <tr key={u.id}>
                  <td className="text-sm-muted nowrap">{u.uploaded_at}</td>
                  <td>{u.filename}</td>
                  <td>{u.records_count}건</td>
                  <td>
                    <span className={`badge ${u.status === 'success' ? 'badge-green' : u.status === 'failed' ? 'badge-red' : 'badge-amber'}`}>
                      {u.status === 'success' ? '완료' : u.status === 'failed' ? '실패' : '처리중'}
                    </span>
                    {u.error_message && <div style={{fontSize:'11px',color:'#991B1B',marginTop:'2px'}}>{u.error_message}</div>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// 모든 admin 서브 페이지 상단에 표시하는 5장 KPI. /admin/dashboard 응답을 자체 fetch.
function AdminKpiBar() {
  const { data: admin } = useFetch('/admin/dashboard', []);
  if (!admin) {
    return <div className="grid-kpi-5 mb-0">{[1,2,3,4,5].map(i => (
      <div key={i} className="kpi-card"><div className="kpi-icon-wrap" style={{background:'#F1F5F9'}}>&nbsp;</div>
        <div className="kpi-body"><div className="skeleton skel-12-60" >&nbsp;</div>
          <div className="skeleton skel-24-80" >&nbsp;</div></div></div>
    ))}</div>;
  }
  // 매칭률 색상 — 60% 이상 초록, 40~60 노랑, 그 외 빨강
  const mr = admin.matching_rate || 0;
  const mrColor = mr >= 60 ? '#16A34A' : mr >= 40 ? '#F59E0B' : '#DC2626';
  const items = [
    { label: '총 공고', value: `${admin.total_announcements?.toLocaleString()}건` },
    { label: '총 사용자', value: `${admin.total_users}명` },
    { label: '평균 사정률', value: `${(admin.avg_assessment_rate || 99.5).toFixed(2)}%` },
    {
      label: '사정률 매칭률',
      value: `${mr}%`,
      sub: `분석 가능 공고 ${(admin.analyzable_announcements || 0).toLocaleString()}건 (${admin.analyzable_rate || 0}%)`,
      color: mrColor,
    },
    { label: '데이터 출처', value: admin.source_ratio ? `G2B ${admin.source_ratio.G2B?.toLocaleString()} / D2B ${admin.source_ratio.D2B}` : '-' },
  ];
  return <div className="grid-kpi-5 mb-0">{items.map((k, i) => (
    <div key={i} className="kpi-card"><div className="kpi-body">
      <div className="kpi-label">{k.label}</div>
      <div className="kpi-value" style={{fontSize: i === 4 ? '13px' : undefined, color: k.color}}>{k.value}</div>
      {k.sub && <div style={{fontSize:'11px',color:'var(--text-secondary)',marginTop:'2px'}}>{k.sub}</div>}
    </div></div>
  ))}</div>;
}

// ── 사용자 관리 섹션 ─────────────────────────────────────────────────────────
function AdminUsersSection() {
  const { authFetch } = useAuth();
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [toggling, setToggling] = useState(null);
  const addToast = useToast();
  const load = () => {
    apiGet(`/admin/dashboard`)
      .then(d => setUsers(d.users || []))
      .finally(() => setLoading(false));
  };
  useEffect(() => { load(); }, []);
  // 진행률 5초 폴링 (in_progress 상태일 때만 표시)
  useEffect(() => {
    let alive = true;
    const tick = () => apiGet('/admin/sync/progress')
      .then(d => { if (alive) setProgress(d && d.in_progress ? d : null); })
      .catch(() => { if (alive) setProgress(null); });
    tick();
    const id = setInterval(tick, 5000);
    return () => { alive = false; clearInterval(id); };
  }, []);
  const handleToggle = (id) => {
    setToggling(id);
    apiSend('PUT', `/admin/users/${id}/status`)
      .then(r => r.json())
      .then(d => { addToast(d.message, 'success'); load(); })
      .catch(() => addToast('상태 변경 실패', 'error'))
      .finally(() => setToggling(null));
  };
  if (loading) return <LoadingState message="사용자 목록 불러오는 중..." />;
  const filtered = users.filter(u => (u.email || '').includes(search));
  return (
    <div className="card">
      <div className="card-header">
        <div className="card-title">사용자 관리</div>
        <input className="search-input" placeholder="이메일 검색"
               value={search} onChange={e => setSearch(e.target.value)}
               style={{maxWidth:'240px'}} />
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>이메일</th><th>이름</th><th>역할</th><th>플랜</th><th>분석수</th><th>상태</th><th></th></tr></thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={7} className="empty-cell">사용자가 없습니다.</td></tr>
            ) : filtered.map(u => (
              <tr key={u.id}>
                <td>{u.email}</td>
                <td>{u.name || '-'}</td>
                <td><span className={`badge ${u.role === 'admin' ? 'badge-amber' : 'badge-blue'}`}>{u.role}</span></td>
                <td>{u.plan || '-'}</td>
                <td>{(u.query_count || 0).toLocaleString()}</td>
                <td>
                  <span className="status-indicator">
                    <span className={`status-dot ${u.is_active ? 'active' : 'completed'}`}></span>
                    {u.is_active ? '활성' : '비활성'}
                  </span>
                </td>
                <td>
                  <button className="btn btn-outline btn-sm"
                          disabled={toggling === u.id}
                          onClick={() => handleToggle(u.id)}>
                    {toggling === u.id ? '...' : (u.is_active ? '비활성화' : '활성화')}
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── 데이터 수집 섹션 ─────────────────────────────────────────────────────────
function AdminSyncSection() {
  const { authFetch } = useAuth();
  const [pipelines, setPipelines] = useState([]);
  const [history, setHistory] = useState([]);
  const [syncing, setSyncing] = useState(false);
  const [progress, setProgress] = useState(null);
  const addToast = useToast();
  const load = () => {
    apiGet(`/admin/dashboard`).then(d => setPipelines(d.pipelines || []));
    // 차트용 30건 + 테이블용 10건 한 번에 가져옴 (30건 fetch)
    apiGet(`/admin/sync/history?page_size=30`).then(d => setHistory(d.items || []));
  };
  useEffect(() => { load(); }, []);
  const handleSync = () => {
    setSyncing(true);
    apiSend('POST', `/admin/sync`)
      .then(r => r.json())
      .then(d => { addToast(`${d.message} (${d.records}건)`, 'success'); load(); })
      .catch(() => addToast('수집 실패', 'error'))
      .finally(() => setSyncing(false));
  };
  const handleRetry = (id) => {
    apiSend('POST', `/admin/sync/${id}/retry`)
      .then(r => r.json())
      .then(d => { addToast(d.message, 'success'); load(); })
      .catch(() => addToast('재시도 실패', 'error'));
  };
  return (
    <div className="col-stack-16">
      <div className="card">
        <div className="card-header">
          <div><div className="card-title">데이터 수집 관리</div><div className="card-sub">수동 동기화 및 수집 이력</div></div>
          <button className="btn btn-primary" disabled={syncing} onClick={handleSync}>
            {syncing ? '수집 중...' : '수동 수집'}
          </button>
        </div>
        {pipelines.map((p, i) => (
          <div key={i} className="pipeline-row">
            <span className={`dot ${p.status === 'success' ? 'dot-green' : p.status === 'running' ? 'dot-amber' : 'dot-red'}`}></span>
            <div className="flex-1">
              <div className="pipeline-name">{p.name}</div>
              <div className="pipeline-time">마지막 실행: {p.last} &middot; {p.count}</div>
            </div>
          </div>
        ))}
        {progress && (
          <div data-testid="admin-sync-progress" style={{marginTop:'12px',padding:'12px',
            border:'1px solid var(--border)',borderRadius:'8px',background:'#FFFBEB'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
              <div style={{fontSize:'12px',fontWeight:'700',color:'#92400E'}}>
                수집 진행 중 — {progress.source || '-'} · {progress.sync_type || '-'}
              </div>
              <div style={{fontSize:'12px',fontWeight:'700',color:'#92400E'}}>{Math.round(progress.progress_pct || 0)}%</div>
            </div>
            <div style={{width:'100%',height:'8px',background:'#FDE68A',borderRadius:'4px',overflow:'hidden'}}>
              <div style={{width:`${Math.min(100, Math.round(progress.progress_pct || 0))}%`,
                height:'100%',background:'#F59E0B',transition:'width 0.4s ease'}}></div>
            </div>
            <div style={{fontSize:'11px',color:'#92400E',marginTop:'6px'}}>
              페이지 {progress.last_page || '-'} · 커서일자 {progress.last_cursor_date || '-'}
            </div>
          </div>
        )}
      </div>
      {/* 수집 추이 차트 — 최근 30회 */}
      {history.length > 0 && (
        <div className="card">
          <div className="card-header">
            <div>
              <div className="card-title">수집 추이</div>
              <div className="card-sub">최근 {history.length}회 — 수신/적재 건수와 성공률</div>
            </div>
          </div>
          <ResponsiveContainer width="100%" height={220}>
            <ComposedChart data={[...history].reverse().map(h => ({
              time: (h.started_at || '').slice(5, 16),
              fetched: h.records_fetched || 0,
              inserted: h.inserted_count || 0,
              isFailed: h.status !== 'success',
            }))}>
              <CartesianGrid stroke="var(--border)" strokeDasharray="3 3" vertical={false} />
              <XAxis dataKey="time" tick={{ fontSize: 10 }} interval="preserveStartEnd" />
              <YAxis tick={{ fontSize: 11 }} />
              <Tooltip contentStyle={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 6, fontSize: 12 }} />
              <Legend wrapperStyle={{ fontSize: 11 }} />
              <Bar dataKey="fetched" name="수신" fill="#94A3B8" radius={[4,4,0,0]} />
              <Bar dataKey="inserted" name="신규 적재" fill="var(--primary)" radius={[4,4,0,0]} />
            </ComposedChart>
          </ResponsiveContainer>
        </div>
      )}
      <div className="card">
        <div className="card-header"><div className="card-title">수집 히스토리</div></div>
        <div className="table-wrap">
          <table>
            <thead><tr><th>수집일시</th><th>출처</th><th>유형</th><th>건수</th><th>상태</th><th>소요시간</th><th></th></tr></thead>
            <tbody>
              {history.length === 0 ? (
                <tr><td colSpan={7} className="empty-cell">수집 이력이 없습니다.</td></tr>
              ) : history.map(h => (
                <tr key={h.id}>
                  <td className="text-sm-muted nowrap">{h.started_at}</td>
                  <td><span className={`badge ${h.source === 'G2B' ? 'badge-blue' : 'badge-amber'}`}>{h.source}</span></td>
                  <td style={{fontSize:'12.5px'}}>{h.sync_type}</td>
                  <td>{h.records_fetched || 0}</td>
                  <td>
                    <span className="status-indicator">
                      <span className={`status-dot ${h.status === 'success' ? 'active' : 'completed'}`}></span>
                      {h.status}
                    </span>
                  </td>
                  <td className="text-sm-muted">{h.duration_sec != null ? `${h.duration_sec}초` : '-'}</td>
                  <td>{h.status !== 'success' && <button className="btn btn-outline btn-sm" onClick={() => handleRetry(h.id)}>재시도</button>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── 스토리지·스케줄 섹션 ─────────────────────────────────────────────────────
function AdminStorageSection() {
  const { data: schedule, setData: setSchedule } = useFetch('/admin/schedule', []);
  const { data: nas } = useFetch('/admin/nas-status', []);
  const addToast = useToast();
  const change = (interval) => {
    apiSend('PUT', `/admin/schedule?interval=${interval}&time=02:00&enabled=true`)
      .then(d => { addToast(d.message, 'success'); setSchedule(d); })
      .catch(() => addToast('스케줄 변경 실패', 'error'));
  };
  const usedGb = nas ? (nas.total_gb - nas.free_gb).toFixed(1) : 0;
  const usagePct = nas && nas.total_gb > 0 ? Math.round((nas.total_gb - nas.free_gb) / nas.total_gb * 100) : 0;
  const intervalLabel = { hourly: '매시', daily: '매일', weekly: '매주' };
  return (
    <div className="grid-2">
      <div className="card">
        <div className="card-header"><div className="card-title">자동 수집 스케줄</div></div>
        <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'12px'}}>
          <div className="gap-8">
            {['hourly','daily','weekly'].map(iv => (
              <button key={iv}
                className={`btn ${schedule?.interval === iv ? 'btn-primary' : 'btn-outline'}`}
                className="flex-1"
                onClick={() => change(iv)}>
                {intervalLabel[iv]}
              </button>
            ))}
          </div>
          {schedule && (
            <>
              <div className="text-md-muted">
                현재 설정: <strong>{intervalLabel[schedule.interval]}</strong> {schedule.time} · {schedule.enabled ? '활성' : '비활성'}
              </div>
              {schedule.next_run && (
                <div style={{fontSize:'12px',color:'var(--text-muted)'}}>다음 실행: {schedule.next_run}</div>
              )}
            </>
          )}
        </div>
      </div>
      <div className="card">
        <div className="card-header"><div className="card-title">NAS 저장소 상태</div></div>
        <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:'10px'}}>
          {nas ? (
            <>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
                <span>마운트 상태</span>
                <span className="status-indicator">
                  <span className={`status-dot ${nas.mounted ? 'active' : 'completed'}`}></span>
                  {nas.mounted ? '정상' : '미연결'}
                </span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'13px'}}>
                <span>사용량</span>
                <span style={{fontWeight:'600'}}>{usedGb} / {nas.total_gb} GB ({usagePct}%)</span>
              </div>
              <div style={{height:'8px',background:'var(--bg)',borderRadius:'4px',overflow:'hidden'}}>
                <div style={{width:`${usagePct}%`,height:'100%',background:`linear-gradient(90deg, ${usagePct > 80 ? '#DC2626' : usagePct > 60 ? '#F59E0B' : '#10B981'}, ${usagePct > 80 ? '#991B1B' : usagePct > 60 ? '#D97706' : '#059669'})`}}></div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:'12px',color:'var(--text-muted)'}}>
                <span>DB 크기</span><span>{nas.db_size_mb} MB</span>
              </div>
            </>
          ) : (
            <div className="text-md-muted">NAS 정보 로드 중...</div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Auth Context ──────────────────────────────────────────────────────────────
const AuthContext = createContext();
function useAuth() { return useContext(AuthContext); }

function AuthProvider({ children }) {
  const [user, setUser] = useState(null);
  const [token, setToken] = useState(localStorage.getItem('token'));
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (token) {
      fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${token}` } })
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(u => { setUser(u); setLoading(false); })
        .catch(() => { localStorage.removeItem('token'); setToken(null); setUser(null); setLoading(false); });
    } else {
      setLoading(false);
    }
  }, [token]);

  const login = async (username, password) => {
    const r = await fetch(`${API}/auth/login?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '로그인 실패'); }
    const data = await r.json();
    localStorage.setItem('token', data.access_token);
    setToken(data.access_token);
    setUser(data.user);
    // 관리자 계정은 로그인 직후 자동으로 /admin 으로 진입
    if (data.user?.role === 'admin' && window.location.pathname === '/') {
      window.history.pushState(null, '', '/admin');
      window.dispatchEvent(new PopStateEvent('popstate'));
    }
    return data;
  };

  const register = async (username, email, password, name) => {
    const params = new URLSearchParams({ username, email, password, ...(name ? { name } : {}) });
    const r = await fetch(`${API}/auth/register?${params}`, { method: 'POST' });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || '회원가입 실패'); }
    const data = await r.json();
    localStorage.setItem('token', data.access_token);
    setToken(data.access_token);
    setUser(data.user);
    return data;
  };

  const logout = () => {
    localStorage.removeItem('token');
    setToken(null);
    setUser(null);
  };

  const authHeaders = () => token ? { Authorization: `Bearer ${token}` } : {};

  const authFetch = (url, options = {}) => {
    const headers = { ...authHeaders(), ...(options.headers || {}) };
    // FormData일 때는 Content-Type을 설정하지 않음
    if (options.body instanceof FormData) {
      delete headers['Content-Type'];
    }
    return fetch(url, { ...options, headers });
  };

  return (
    <AuthContext.Provider value={{ user, token, loading, login, register, logout, authHeaders, authFetch }}>
      {children}
    </AuthContext.Provider>
  );
}

// ── NAS/외부수집 진행률 뱃지 (top-bar) ──────────────────────────────────────
function SyncProgressBadge() {
  const { user } = useAuth();
  const [prog, setProg] = useState(null);
  // Bug C: 관리자만 폴링 (비관리자는 403 5초 스팸 방지)
  const isAdmin = !!(user && user.role === 'admin');
  useEffect(() => {
    if (!isAdmin) return;  // 비관리자: 폴링 자체 비활성화
    let alive = true;
    let id = null;
    const tick = () => apiGet('/admin/sync/progress')
      .then(d => {
        if (!alive) return;
        const active = d && d.in_progress ? d : null;
        setProg(active);
        // 진행 중이 아니면 polling 중단 — 5초마다 ping 하지 않음
        if (!active && id) { clearInterval(id); id = null; }
      })
      .catch(() => {
        if (!alive) return;
        setProg(null);
        if (id) { clearInterval(id); id = null; }
      });
    tick();
    id = setInterval(tick, 5000);
    return () => { alive = false; if (id) clearInterval(id); };
  }, [isAdmin]);
  if (!isAdmin) return null;
  if (!prog) return null;
  const pct = Math.round(prog.progress_pct || 0);
  return (
    <span data-testid="progress-badge" className="badge badge-amber"
      title={`수집 중 — ${prog.source || ''} ${prog.sync_type || ''} · 페이지 ${prog.last_page || '-'}`}
      style={{display:'inline-flex',alignItems:'center',gap:'6px',fontSize:'11px',padding:'4px 8px'}}>
      <span style={{width:'8px',height:'8px',borderRadius:'50%',background:'#F59E0B',
        animation:'pulse 1.4s infinite'}}></span>
      수집 {pct}%
    </span>
  );
}

    if (path !== '/comprehensive') return;
    if (selectedAnnouncement) return;
    const qs = new URLSearchParams(window.location.search);
    const id = qs.get('id');
    if (!id) return;
    apiGet(`/announcements/${id}`)
      .then(d => { if (d && d.id) setSelectedAnnouncement(d); })
      .catch(() => {});
  }, [path, selectedAnnouncement]);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const addToast = useToast();
  const isAdminRoute = path.startsWith('/admin');
  const page = pathToPageId(path);

  // 1) admin 영역 진입 시 다크 테마 자동 토글
  useEffect(() => {
    document.documentElement.dataset.theme = isAdminRoute ? 'admin' : '';
  }, [isAdminRoute]);

  // 2) 비관리자가 /admin/* 직접 접근 시 / 로 리다이렉트
  useEffect(() => {
    if (isAdminRoute && user && user.role !== 'admin') {
      addToast('관리자 권한이 필요합니다.', 'error');
      navigate('/');
    }
  }, [isAdminRoute, user]);

  if (authLoading) {
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:'#F0F4F8'}}>
      <div className="loading">로딩 중...</div>
    </div>;
  }

  if (!user) {
    return authPage === 'login'
      ? <LoginPage onSwitch={() => setAuthPage('register')} />
      : <RegisterPage onSwitch={() => setAuthPage('login')} />;
  }

  // ── 관리자 영역 — 풀 페이지 전환 ──
  if (isAdminRoute && user.role === 'admin') {
    return <AdminApp path={path} navigate={navigate} user={user} logout={logout} authFetch={authFetch} />;
  }

  const visiblePages = PAGES.filter(p => !p.adminOnly || user.role === 'admin');
  const sections = [...new Set(visiblePages.map(p => p.section))];
  const current = visiblePages.find(p => p.id === page);

  const handleTopbarSync = () => {
    setSyncingTopbar(true);
    apiSend('POST', `/admin/sync`)
      .then(r => r.json())
      .then(d => addToast(`${d.message} (${d.records}건)`, 'success'))
      .catch(() => addToast('수집 실패', 'error'))
      .finally(() => setSyncingTopbar(false));
  };

  const handleSelectAnnouncement = (announcement) => {
    setSelectedAnnouncement(announcement);
    setPendingNavigateToComprehensive(true);
  };

  const renderPage = () => {
    switch(page) {
      case 'announcements': return <AnnouncementPage onSelectAnnouncement={handleSelectAnnouncement} />;
      case 'comprehensive': return <ComprehensivePage announcement={selectedAnnouncement} />;
      case 'mypage': return <MyPage />;
      case 'upload': return <DataUploadPage />;
      default: return <AnnouncementPage onSelectAnnouncement={handleSelectAnnouncement} />;
    }
  };

  return (
    <div className="layout">
      {mobileMenuOpen && <div className="mobile-overlay" onClick={() => setMobileMenuOpen(false)}></div>}
      <aside className={`sidebar ${sidebarCollapsed ? 'collapsed' : ''} ${mobileMenuOpen ? 'mobile-open' : ''}`}>
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-text">
              <div className="brand-name">비드스타</div>
              <div className="logo-sub">조달 입찰 분석 플랫폼</div>
            </div>
          </div>
          <button className="sidebar-toggle" onClick={() => { setSidebarCollapsed(c => !c); setMobileMenuOpen(false); }}
            title={sidebarCollapsed ? '사이드바 펼치기' : '사이드바 접기'} aria-label="사이드바 토글">
            <Icon name="menu" size={16} />
          </button>
        </div>
        {sections.map(section => (
          <div key={section}>
            {!sidebarCollapsed && (
              <div className="sidebar-label" style={{padding:'12px 16px 4px',fontSize:'10px',textTransform:'uppercase',color:'rgba(255,255,255,0.35)',letterSpacing:'1px',fontWeight:700}}>{section}</div>
            )}
            {visiblePages.filter(p => p.section === section).map(p => (
              <div key={p.id} style={{padding:'2px 8px'}}>
                <button className={`nav-item ${page === p.id ? 'active' : ''}`}
                  data-testid={`nav-${p.id}`}
                  onClick={() => { navigate(p.path); setMobileMenuOpen(false); }}
                  title={p.label}>
                  <span className="nav-icon"><Icon name={p.icon} size={16} /></span>
                  <span>{p.label}</span>
                </button>
              </div>
            ))}
          </div>
        ))}
        <div className="sidebar-bottom">
          <div className="user-badge">
            <div className="avatar">{(user.name || user.username || '?')[0]}</div>
            <div className="user-info flex-1" >
              <div className="name">{user.name || user.username}</div>
              <div className="plan">{user.email || ''}</div>
            </div>
            <button onClick={logout} title="로그아웃"
              style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',cursor:'pointer',fontSize:'13px',padding:'4px'}}>
              ↪
            </button>
          </div>
        </div>
      </aside>
      <div className="main">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <button className="mobile-menu-btn" onClick={() => setMobileMenuOpen(true)}
              style={{background:'none',border:'1.5px solid var(--border)',cursor:'pointer',padding:'6px',borderRadius:'6px',color:'var(--text-primary)',display:'inline-flex',alignItems:'center',justifyContent:'center'}}
              aria-label="메뉴 열기">
              <Icon name="menu" size={18} />
            </button>
            <div className="topbar-title">{current?.label}</div>
          </div>
          <div className="topbar-right">
            <SyncProgressBadge />
            <span className="badge badge-green" style={{fontSize:'10px'}}>● 연결됨</span>
            {user.role === 'admin' && (
              <button className="btn btn-primary btn-sm" disabled={syncingTopbar} onClick={handleTopbarSync}>
                {syncingTopbar ? '수집 중...' : '수동 수집'}
              </button>
            )}
          </div>
        </div>
        <div className="content">
          {renderPage()}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AuthProvider><ToastProvider><App /></ToastProvider></AuthProvider>
);
</script>
</body>
</html>
