<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>조달 입찰 사정률 예측 플랫폼</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; }
  body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); color: var(--text-primary); -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; line-height: 1.5; }
  /* Apple HIG-style Korean typography polish */
  h1, h2, h3, .card-title, .summary-title, .kpi-value { letter-spacing: -0.025em; line-height: 1.3; }
  .text-xs-muted, .text-sm-muted { letter-spacing: 0; }
  table.table, .table-wrap table { line-height: 1.4; }
  :root {
    --primary: #0066CC;
    --primary-dark: #0052A3;
    --primary-light: #DBEAFE;
    --secondary: #1E3A5F;
    --secondary-soft: #2A4A75;
    --accent: #00A3FF;
    --bg: #F1F5F9;
    --surface: #FFFFFF;
    --surface-soft: #F8FAFC;
    --text-primary: #0F172A;
    --text-secondary: #64748B;
    --text-muted: #94A3B8;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --success: #10B981;
    --warning: #F59E0B;
    --danger: #DC2626;
    --sidebar-w: 232px;
    --sidebar-collapsed-w: 64px;
    --topbar-h: 56px;
    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --shadow-sm: 0 1px 2px rgba(15,23,42,0.04), 0 0 0 1px rgba(15,23,42,0.04);
    --shadow: 0 2px 8px rgba(15,23,42,0.06), 0 0 0 1px rgba(15,23,42,0.04);
    --shadow-md: 0 4px 12px rgba(15,23,42,0.08), 0 0 0 1px rgba(15,23,42,0.05);
    --shadow-lg: 0 12px 32px rgba(15,23,42,0.12);
    /* Gradient design tokens (refactored from inline linear-gradient usages) */
    --gradient-brand: linear-gradient(135deg, #1E3A5F 0%, #0066CC 100%);
    --gradient-brand-deep: linear-gradient(135deg, #1E3A5F 0%, #0052A3 100%);
    --gradient-success: linear-gradient(135deg, #059669 0%, #10B981 100%);
    --gradient-success-alt: linear-gradient(135deg, #047857 0%, #16A34A 100%);
    --gradient-amount: linear-gradient(135deg, #FFF7ED 0%, #FFFBEB 100%);
    --gradient-confidence: linear-gradient(90deg, var(--primary), var(--accent));
    --gradient-scroll-fade: linear-gradient(90deg, transparent, rgba(255,255,255,0.9));
    --gradient-shimmer: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  }
  /* Admin 영역 전용 테마 (data-theme="admin") — 다크 + 빨강 강조 */
  :root[data-theme="admin"] {
    --primary: #DC2626;
    --primary-dark: #991B1B;
    --primary-light: #FEE2E2;
    --secondary: #18181B;
    --secondary-soft: #27272A;
    --accent: #F87171;
    --bg: #18181B;
    --surface: #27272A;
    --surface-soft: #3F3F46;
    --text-primary: #F4F4F5;
    --text-secondary: #A1A1AA;
    --text-muted: #71717A;
    --border: #3F3F46;
    --border-strong: #52525B;
    /* admin: 어두운 표면 위 자연스러운 스크롤 페이드 */
    --gradient-scroll-fade: linear-gradient(90deg, transparent, rgba(39,39,42,0.9));
  }
  :root[data-theme="admin"] body { background: var(--bg); color: var(--text-primary); }
  :root[data-theme="admin"] th { background: var(--surface-soft); color: var(--text-secondary); border-bottom-color: var(--border); }
  :root[data-theme="admin"] tr:hover td { background: rgba(220, 38, 38, 0.08); }
  :root[data-theme="admin"] tr:hover td:first-child { box-shadow: inset 3px 0 0 var(--primary); }
  :root[data-theme="admin"] .filter-select, :root[data-theme="admin"] .search-input,
  :root[data-theme="admin"] .searchable-select-input { background: var(--surface-soft); color: var(--text-primary); border-color: var(--border); }
  :root[data-theme="admin"] .topbar { background: var(--surface); border-bottom-color: var(--border); }
  :root[data-theme="admin"] .topbar-title { color: var(--text-primary); }
  :root[data-theme="admin"] .badge-blue { background: rgba(220, 38, 38, 0.15); color: var(--primary); }
  /* admin 사이드바 active 강조 (왼쪽 빨간 보더) */
  :root[data-theme="admin"] .nav-item.active {
    background: rgba(220, 38, 38, 0.18);
    color: #fff;
    box-shadow: inset 3px 0 0 var(--primary);
  }
  :root[data-theme="admin"] .nav-item:hover { background: rgba(255,255,255,0.06); }
  /* admin 모드 표시 배지 */
  .admin-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 20px;
    background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 700; letter-spacing: 0.4px;
  }
  /* SVG icon defaults */
  .icon { width: 18px; height: 18px; flex-shrink: 0; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .icon-sm { width: 14px; height: 14px; }
  .icon-lg { width: 22px; height: 22px; }
  .icon-xl { width: 28px; height: 28px; }
  .icon-fill { fill: currentColor; stroke: none; }
  .layout { display: flex; height: 100vh; overflow: hidden; }
  .sidebar {
    width: var(--sidebar-w); background: var(--secondary);
    display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto;
    transition: width 0.25s ease;
  }
  .sidebar.collapsed { width: var(--sidebar-collapsed-w); }
  .sidebar.collapsed .sidebar-label,
  .sidebar.collapsed .nav-item span:not(.nav-icon), .sidebar.collapsed .user-info,
  .sidebar.collapsed .logo-sub { display: none; }
  /* collapsed 모드에서 워드마크는 첫 글자(비)만 큼지막하게 */
  .sidebar.collapsed .brand-name { font-size: 16px; }
  .sidebar.collapsed .brand-name::after { content: ''; }
  .sidebar.collapsed .brand-name { overflow: hidden; max-width: 36px; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 10px; }
  .sidebar.collapsed .nav-item .nav-icon { margin: 0; }
  .sidebar.collapsed .user-badge { justify-content: center; padding: 8px; }
  .sidebar.collapsed .sidebar-logo { padding: 16px 8px; }
  .sidebar.collapsed .logo-mark { justify-content: center; }
  .sidebar-toggle {
    background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer;
    font-size: 18px; padding: 4px 8px; border-radius: 4px; transition: all 0.15s;
  }
  .sidebar-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .sidebar-logo { padding: 16px 16px 12px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: space-between; }
  .logo-mark { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; color: #fff; min-width: 0; }
  .logo-text { min-width: 0; }
  .brand-name { font-size: 18px; font-weight: 900; letter-spacing: -0.4px; color: #fff; line-height: 1.1; }
  .logo-sub { font-size: 10px; color: rgba(255,255,255,0.45); margin-top: 3px; }
  /* Collapsed sidebar: 첫글자만 보이는 미니 워드마크 */
  .sidebar.collapsed .brand-name { font-size: 14px; text-align: center; }
  .sidebar.collapsed .logo-text { width: 100%; text-align: center; }
  .sidebar-section { padding: 12px 8px 4px; }
  .sidebar-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.8px; padding: 0 8px; margin-bottom: 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: 8px; color: rgba(255,255,255,0.65);
    cursor: pointer; font-size: 13px; font-weight: 500;
    /* U6 fix: all 0.15s 대신 background/color 만 0.08s 로 — active 강조 즉시 보임 */
    transition: background 0.08s ease, color 0.08s ease; margin-bottom: 2px;
    border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: var(--primary); color: #fff; transition: background 0s, color 0s; }
  .nav-item .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
  .sidebar-bottom { margin-top: auto; padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); }
  .user-badge { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .user-info .name { font-size: 13px; font-weight: 600; color: #fff; }
  .user-info .plan { font-size: 11px; color: rgba(255,255,255,0.45); }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar {
    height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; justify-content: space-between; flex-shrink: 0;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.2px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .badge { font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
  .badge-blue { background: var(--primary-light); color: var(--primary); }
  .badge-green { background: #ECFDF5; color: #059669; }
  .badge-amber { background: #FFFBEB; color: #B45309; }
  .badge-gray { background: #F1F5F9; color: #475569; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 600;
    cursor: pointer; border: none; transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-outline { background: transparent; color: var(--text-primary); border: 1.5px solid var(--border); }
  .btn-outline:hover { background: var(--bg); }
  .btn:disabled { opacity: 0.5; cursor: default; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; flex-wrap: wrap; }
  .card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 6px; display: flex; align-items: center; gap: 6px; line-height: 1.5; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
  .grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; }
  /* 5장 KPI 자동 반응형 (≥1280: 5col, 1024~1279: 3col, ≤1023: 2col) */
  .grid-kpi-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  @media (max-width: 1279px) { .grid-kpi-5 { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 768px)  { .grid-kpi-5 { grid-template-columns: repeat(2, 1fr); gap: 10px; } }
  @media (max-width: 380px)  { .grid-kpi-5 { grid-template-columns: 1fr; } }
  .mb-16 { margin-bottom: 16px; }
  .mb-20 { margin-bottom: 20px; }
  .kpi-card {
    background: var(--surface); border-radius: var(--radius); padding: 12px 14px;
    box-shadow: var(--shadow); display: flex; align-items: center; gap: 10px;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .kpi-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .kpi-icon-wrap {
    width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--primary-light); color: var(--primary);
  }
  .kpi-card.tone-amber .kpi-icon-wrap { background: #FEF3C7; color: #B45309; }
  .kpi-card.tone-green .kpi-icon-wrap { background: #D1FAE5; color: #047857; }
  .kpi-card.tone-purple .kpi-icon-wrap { background: #EDE9FE; color: #6D28D9; }
  .kpi-body { min-width: 0; flex: 1; }
  .kpi-label { font-size: 11.5px; color: var(--text-secondary); font-weight: 500; margin-bottom: 2px; letter-spacing: -0.01em; }
  .kpi-value { font-size: 19px; font-weight: 800; color: var(--text-primary); white-space: nowrap; letter-spacing: -0.025em; line-height: 1.2; }
  .kpi-change { font-size: 12px; margin-top: 4px; }
  .kpi-change.up { color: var(--success); }
  .kpi-change.down { color: var(--danger); }
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; position: relative; }
  .table-wrap::after {
    content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 24px;
    background: var(--gradient-scroll-fade);
    pointer-events: none; opacity: 0; transition: opacity 0.2s;
  }
  .table-wrap.has-scroll::after { opacity: 1; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: auto; }
  th { text-align: left; padding: 10px 12px; font-size: 11.5px; font-weight: 600; color: var(--text-secondary); border-bottom: 1.5px solid var(--border); background: #F8FAFC; white-space: nowrap; position: sticky; top: 0; z-index: 1; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #EFF6FF; }
  tr:hover td:first-child { box-shadow: inset 3px 0 0 var(--primary); }
  .filter-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px; background: var(--surface); border-radius: 10px; margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04); flex-wrap: wrap;
  }
  .filter-bar-main { display: flex; align-items: center; gap: 10px; width: 100%; }
  .filter-bar-advanced { display: flex; align-items: center; gap: 10px; width: 100%; flex-wrap: wrap; padding-top: 10px; border-top: 1px solid var(--border); margin-top: 10px; }
  .filter-toggle-btn {
    padding: 5px 10px; font-size: 11px; font-weight: 600; border-radius: 6px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: 'Pretendard', sans-serif; transition: all 0.15s; white-space: nowrap;
  }
  .filter-toggle-btn:hover { background: var(--bg); }
  .filter-toggle-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .filter-select {
    padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; color: var(--text-primary); background: #F8FAFC;
    font-family: 'Pretendard', sans-serif; cursor: pointer; transition: border-color 0.15s;
  }
  .filter-select:focus { border-color: var(--primary); outline: none; }
  .search-input {
    flex: 1; min-width: 180px; padding: 7px 12px;
    border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; font-family: 'Pretendard', sans-serif; outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,102,204,0.1); }
  /* Searchable dropdown */
  .searchable-select { position: relative; }
  .searchable-select-input { padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; font-family: 'Pretendard', sans-serif; outline: none; width: 140px; background: #F8FAFC; cursor: pointer; }
  .searchable-select-input:focus { border-color: var(--primary); }
  .searchable-select-dropdown { position: absolute; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto; background: #fff; border: 1.5px solid var(--border); border-radius: 7px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 50; margin-top: 4px; }
  .searchable-select-item { padding: 7px 12px; font-size: 12px; cursor: pointer; transition: background 0.1s; }
  .searchable-select-item:hover { background: #EFF6FF; }
  .searchable-select-item.selected { background: #DBEAFE; color: var(--primary); font-weight: 600; }
  .tag { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .tag-construction { background: #EFF6FF; color: #0066CC; }
  .tag-service { background: #F5F3FF; color: #7C3AED; }
  .tag-defense { background: #FFF7ED; color: #C2410C; }
  .confidence-bar { height: 6px; border-radius: 3px; background: #E2E8F0; margin-top: 10px; overflow: hidden; }
  .confidence-fill { height: 100%; border-radius: 3px; background: var(--gradient-confidence); }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
  .dot-green { background: #10B981; }
  .dot-amber { background: #F59E0B; }
  .dot-red { background: #EF4444; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
  .page-header { margin-bottom: 20px; }
  .page-title { font-size: 20px; font-weight: 800; color: var(--text-primary); }
  .page-desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .pipeline-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .pipeline-row:last-child { border-bottom: none; }
  .pipeline-name { font-size: 13px; font-weight: 600; flex: 1; }
  .pipeline-time { font-size: 11.5px; color: var(--text-secondary); }
  .metric-box { padding: 14px; background: #F8FAFC; border-radius: 8px; text-align: center; }
  .metric-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; }
  .metric-val { font-size: 22px; font-weight: 800; color: var(--text-primary); margin: 4px 0; }
  .metric-sub { font-size: 11px; color: var(--text-secondary); }
  .prog-bar { height: 8px; border-radius: 4px; background: #E2E8F0; overflow: hidden; margin-top: 6px; }
  .prog-fill { height: 100%; border-radius: 4px; background: var(--primary); }
  .alert { padding: 12px 14px; border-radius: 8px; font-size: 13px; display: flex; align-items: flex-start; gap: 8px; }
  .alert-info { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
  .loading { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 14px; }
  .loading::before { content: ''; display: block; width: 28px; height: 28px; border: 3px solid #E2E8F0; border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 16px; }
  .pagination button { padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 6px; background: var(--surface); cursor: pointer; font-size: 12px; font-family: 'Pretendard', sans-serif; }
  .pagination button:hover { background: var(--bg); }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination button.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .pagination span { font-size: 12px; color: var(--text-secondary); }
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center;
  }
  .modal-content {
    background: var(--surface); border-radius: 12px; padding: 24px;
    max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; }
  .modal-close:hover { background: var(--bg); }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--text-secondary); }
  .detail-val { font-weight: 600; }
  /* Toast */
  .toast-container { position: fixed; top: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 12px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12); min-width: 260px;
    animation: toastIn 0.3s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
  .toast-success { background: #059669; color: #fff; }
  .toast-error { background: #DC2626; color: #fff; }
  .toast-info { background: var(--primary); color: #fff; }
  /* Tabs */
  .tab-nav {
    display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px;
  }
  .tab-btn {
    padding: 10px 20px; font-size: 13.5px; font-weight: 600; color: var(--text-secondary);
    background: none; border: none; cursor: pointer; position: relative;
    transition: color 0.15s; font-family: 'Pretendard', sans-serif;
  }
  .tab-btn:hover { color: var(--text-primary); }
  .tab-btn.active {
    color: var(--primary);
  }
  .tab-btn.active::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: var(--primary); border-radius: 1px;
  }
  .tab-content { min-height: 200px; }
  /* Summary card — 헤더(타이틀+바로가기) 위, 메타(발주기관/기초금액 등) 아래 */
  .summary-card {
    background: var(--gradient-brand);
    border-radius: 10px; padding: 20px 24px; color: #fff; margin-bottom: 20px;
    display: flex; flex-direction: column; gap: 18px;
  }
  .summary-card .summary-title { font-size: 17px; font-weight: 700; line-height: 1.4; min-width: 0; }
  .summary-card .summary-meta {
    display: grid; gap: 12px 20px; width: 100%;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  }
  .summary-card .summary-item { text-align: left; min-width: 0; }
  .summary-card .summary-item-label { font-size: 10.5px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .summary-card .summary-item-value { font-size: 14px; font-weight: 700; line-height: 1.3; word-break: break-word; }
  /* Period buttons */
  .period-btn-group { display: flex; gap: 4px; }
  .period-btn {
    padding: 5px 12px; font-size: 12px; font-weight: 600; border-radius: 6px;
    border: 1.5px solid var(--border); background: transparent; color: var(--text-secondary);
    cursor: pointer; font-family: 'Pretendard', sans-serif; transition: all 0.15s;
  }
  .period-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
  .period-btn:hover:not(.active) { background: var(--bg); }
  /* Scope toggle */
  .scope-toggle { display: flex; border: 1.5px solid var(--border); border-radius: 7px; overflow: hidden; }
  .scope-btn {
    padding: 6px 14px; font-size: 12px; font-weight: 600; border: none;
    background: transparent; color: var(--text-secondary); cursor: pointer;
    font-family: 'Pretendard', sans-serif; transition: all 0.15s;
  }
  .scope-btn.active { background: var(--primary); color: #fff; }
  /* Highlighted rate */
  .rate-highlight {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 18px; background: #EFF6FF; border: 2px solid var(--primary);
    border-radius: 10px; font-size: 20px; font-weight: 800; color: var(--primary);
  }
  .rate-input {
    width: 100px; padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 14px; font-weight: 700; text-align: center; font-family: 'Pretendard', sans-serif;
    outline: none;
  }
  .rate-input:focus { border-color: var(--primary); }
  /* Gap visualization */
  .gap-bar {
    position: relative; height: 28px; background: #E2E8F0; border-radius: 6px;
    overflow: hidden; margin: 4px 0;
  }
  .gap-fill {
    height: 100%; border-radius: 6px; display: flex; align-items: center;
    padding: 0 8px; font-size: 11px; font-weight: 700; color: #fff;
    min-width: 30px; transition: width 0.3s;
  }
  .gap-marker {
    position: absolute; top: -4px; bottom: -4px; width: 3px;
    background: #DC2626; border-radius: 2px;
  }
  /* Prediction card */
  .prediction-card {
    background: var(--gradient-success);
    border-radius: 12px; padding: 28px; color: #fff; text-align: center;
  }
  .prediction-card .pred-label { font-size: 13px; opacity: 0.85; margin-bottom: 8px; }
  .prediction-card .pred-value { font-size: 36px; font-weight: 900; letter-spacing: -1px; }
  .prediction-card .pred-sub { font-size: 14px; opacity: 0.85; margin-top: 6px; }
  /* Match badge */
  .match-yes { background: #F0FDF4; color: #059669; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .match-no { background: #FEF2F2; color: #DC2626; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  /* NAS status */
  .nas-status { display: flex; align-items: center; gap: 8px; }
  .nas-dot { width: 10px; height: 10px; border-radius: 50%; }
  .nas-dot.online { background: #10B981; }
  .nas-dot.offline { background: #EF4444; }
  /* Step Guide */
  .step-guide { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 16px; padding: 12px 20px; background: var(--surface); border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04); }
  .step-item { display: flex; flex-direction: column; align-items: center; gap: 2px; position: relative; flex: 1; }
  .step-circle { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; transition: all 0.2s; }
  .step-circle.completed { background: #059669; color: #fff; }
  .step-circle.active { background: var(--primary); color: #fff; box-shadow: 0 0 0 4px rgba(0,102,204,0.2); }
  .step-circle.pending { background: #E2E8F0; color: #94A3B8; }
  .step-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); }
  .step-label.active { color: var(--primary); }
  .step-label.completed { color: #059669; }
  .step-value { font-size: 10px; color: var(--text-secondary); max-width: 120px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .step-connector { flex: 1; max-width: 100px; height: 2px; background: #E2E8F0; margin: 0 4px; align-self: center; margin-top: -22px; }
  .step-connector.completed { background: #059669; }
  /* Bid amount display */
  .bid-amount-box { background: var(--gradient-amount); border: 1.5px solid #FDE68A; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
  .bid-amount-label { font-size: 11px; color: #92400E; font-weight: 600; }
  .bid-amount-value { font-size: 20px; font-weight: 800; color: #B45309; }
  /* Stats cards row */
  .stats-cards { display: flex; gap: 12px; margin-top: 12px; }
  .stat-card { flex: 1; background: #F8FAFC; border-radius: 8px; padding: 12px; text-align: center; border: 1px solid #E2E8F0; }
  .stat-card-label { font-size: 10px; color: var(--text-secondary); font-weight: 500; margin-bottom: 4px; }
  .stat-card-value { font-size: 16px; font-weight: 800; color: var(--text-primary); }
  .stat-card-sub { font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
  /* Empty state */
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
  .empty-state-desc { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.5; }
  /* Number line */
  .number-line-container { position: relative; padding: 20px 40px 20px 60px; }
  .number-line { position: relative; height: 400px; border-left: 2px solid #94A3B8; margin-left: 30px; }
  .number-line-dot { position: absolute; left: -6px; width: 12px; height: 12px; border-radius: 50%; background: var(--primary); cursor: pointer; transition: all 0.15s; z-index: 2; }
  .number-line-dot:hover { transform: scale(1.5); }
  .number-line-dot.gap-dot { background: #DC2626; }
  .number-line-label { position: absolute; left: 20px; font-size: 11px; white-space: nowrap; transform: translateY(-50%); }
  .number-line-tick { position: absolute; left: -4px; width: 8px; height: 1px; background: #CBD5E1; }
  .gap-highlight { position: absolute; left: -20px; right: -20px; background: rgba(220,38,38,0.08); border: 1px dashed rgba(220,38,38,0.3); border-radius: 4px; cursor: pointer; z-index: 1; transition: background 0.15s; }
  .gap-highlight:hover { background: rgba(220,38,38,0.15); }
  .gap-label { position: absolute; right: -80px; font-size: 10px; font-weight: 700; color: #DC2626; white-space: nowrap; }
  .gap-midpoint { position: absolute; left: -8px; width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 10px solid #DC2626; z-index: 3; cursor: pointer; }
  /* D-Day */
  .d-day { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .d-day.urgent { background: #FEF2F2; color: #DC2626; }
  .d-day.soon { background: #FFFBEB; color: #D97706; }
  .d-day.normal { background: #F0FDF4; color: #059669; }
  .d-day.passed { background: #F1F5F9; color: #94A3B8; }
  /* Quick Preview Panel — 순수 오버레이 (본문 푸시 없음, scrim 클릭으로 닫힘) */
  .quick-preview-scrim { position: fixed; inset: 0; background: rgba(15,23,42,0.18); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); z-index: 99; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
  .quick-preview-scrim.open { opacity: 1; pointer-events: auto; }
  .quick-preview { position: fixed; right: 0; top: 52px; bottom: 0; width: 360px; background: var(--surface); box-shadow: -8px 0 24px rgba(15,23,42,0.12); z-index: 100; overflow-y: auto; padding: 20px; transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.32, 0.72, 0, 1); }
  .quick-preview.open { transform: translateX(0); }
  @media (max-width: 640px) { .quick-preview { width: 100%; } }
  .quick-preview-close { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-secondary); padding: 4px 8px; border-radius: 4px; }
  .quick-preview-close:hover { background: var(--bg); }
  /* ── 자주 쓰이는 유틸리티 클래스 (refactor) ───────────────── */
  .text-muted     { color: var(--text-secondary); }
  .text-xs-muted  { font-size: 11px; color: var(--text-secondary); }
  .text-sm-muted  { font-size: 12px; color: var(--text-secondary); }
  .text-md-muted  { font-size: 13px; color: var(--text-secondary); }
  .text-md        { font-size: 14px; font-weight: 600; }
  .text-rate      { font-weight: 700; color: var(--primary); }
  .text-right     { text-align: right; }
  .text-center    { text-align: center; }
  .nowrap         { white-space: nowrap; }
  .flex-1         { flex: 1; }
  .flex-row-6     { display: flex; align-items: center; gap: 6px; }
  .flex-row-4     { display: flex; align-items: center; gap: 4px; }
  .flex-between   { display: flex; justify-content: space-between; align-items: flex-start; }
  .flex-between-wrap { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 8px; }
  .col-stack-16   { display: flex; flex-direction: column; gap: 16px; }
  .mb-12          { margin-bottom: 12px; }
  .mb-16          { margin-bottom: 16px; }
  .empty-cell     { text-align: center; padding: 24px; color: var(--text-secondary); }
  .empty-message  { color: var(--text-secondary); font-size: 13px; padding: 12px 0; }
  .form-label-sm  { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 2px; }
  .input-sm-full  { width: 100%; padding: 6px 8px; font-size: 12px; }
  /* btn-tiny / btn-tiny-sq removed — folded into .btn-sm at L165 (padding 5px 10px vs old 6px 10-12px, 1px diff) */
  .section-title-sm { font-size: 12px; font-weight: 700; color: var(--primary-dark); margin-bottom: 6px; }
  .opacity-85     { opacity: 0.85; }
  .label-bold-sm  { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
  /* 추가 유틸 */
  .text-md-half-muted { font-size: 12.5px; color: var(--text-secondary); }
  .text-tiny-muted    { font-size: 10px; color: var(--text-secondary); }
  .text-light         { color: #94A3B8; font-size: 12px; }
  .text-success-bold  { font-weight: 700; color: #059669; }
  .text-success       { font-weight: 600; color: #059669; }
  .text-warning-bold  { font-weight: 700; color: #B45309; }
  .text-danger        { color: #DC2626; }
  .text-emerald       { color: #34D399; }
  .text-link          { color: var(--primary); text-decoration: none; }
  .label-on-pred      { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
  .info-row           { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
  .grade-badge        { padding: 2px 8px; font-size: 11px; }
  .gap-6              { display: flex; gap: 6px; }
  .gap-8              { display: flex; gap: 8px; }
  .inline-row         { display: inline-flex; align-items: center; gap: 4px; }
  .card-thin          { border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .help-text          { font-size: 11px; color: var(--text-secondary); margin-top: 10px; line-height: 1.6; }
  .pred-rate-lg       { font-size: 24px; font-weight: 800; color: var(--primary); }
  .row-spread         { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .max-w-200-bold     { font-weight: 600; max-width: 200px; }
  /* 추가 유틸 */
  .w-80               { width: 80px; }
  .w-70               { width: 70px; }
  .w-60               { width: 60px; }
  .min-w-130          { min-width: 130px; }
  .text-sm-muted-nowrap { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .text-md-muted-link { color: var(--primary); text-decoration: none; font-size: 13px; }
  .empty-pad          { padding: 24px; text-align: center; color: var(--text-secondary); font-size: 13px; }
  .bold-mb-4          { font-weight: 700; margin-bottom: 4px; }
  .col-stack-20       { display: flex; flex-direction: column; gap: 20px; }
  .pad-20             { padding: 20px; }
  .empty-pad-32       { text-align: center; padding: 32px; color: var(--text-secondary); }
  .skel-12-60         { width: 60px; height: 12px; margin-bottom: 8px; }
  .skel-24-80         { width: 80px; height: 24px; }
  .progress-bar       { width: 40px; height: 5px; background: #E2E8F0; border-radius: 3px; overflow: hidden; }

  /* Matching rate bar */
  .match-bar-container { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .match-bar-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); min-width: 60px; text-align: right; }
  .match-bar-track { flex: 1; height: 24px; background: #E2E8F0; border-radius: 6px; overflow: hidden; position: relative; }
  .match-bar-fill { height: 100%; border-radius: 6px; display: flex; align-items: center; padding: 0 8px; font-size: 11px; font-weight: 700; color: #fff; min-width: 40px; transition: width 0.5s ease; }
  .match-bar-count { font-size: 11px; color: var(--text-secondary); min-width: 60px; }
  /* Confirmed rate input */
  .confirmed-rate-input { width: 100px; padding: 7px 12px; border: 1.5px solid #F59E0B; border-radius: 7px; font-size: 14px; font-weight: 700; text-align: center; font-family: 'Pretendard', sans-serif; outline: none; background: #FFFBEB; }
  .confirmed-rate-input:focus { border-color: #D97706; box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
  /* Strategy card */
  .strategy-card { background: var(--gradient-brand-deep); border-radius: 12px; padding: 24px; color: #fff; }
  .strategy-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .strategy-row:last-child { border-bottom: none; }
  .strategy-label { font-size: 13px; opacity: 0.8; }
  .strategy-value { font-size: 15px; font-weight: 700; }

  /* Skeleton loading */
  .skeleton { position: relative; overflow: hidden; background: #E2E8F0; border-radius: 6px; }
  .skeleton::after {
    content: ''; position: absolute; inset: 0;
    background: var(--gradient-shimmer);
    animation: skeletonShimmer 1.5s infinite;
  }
  @keyframes skeletonShimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .skeleton-row { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid #F1F5F9; }
  .skeleton-cell { height: 14px; border-radius: 4px; }

  /* Focus visible */
  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 2px solid var(--primary); outline-offset: 2px;
  }

  /* Status dot (instead of tag for status) */
  .status-indicator { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 500; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.active { background: #10B981; }
  .status-dot.completed { background: #94A3B8; }

  /* ── Responsive (Mobile-first cascade) ───────────────────────────── */
  /* Tablet (≤1024px): 4/5-col grids → 2-col, KPI 2x2 */
  @media (max-width: 1024px) {
    .grid-5 { grid-template-columns: repeat(2, 1fr); }
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(2, 1fr); }

    .summary-card .summary-meta { gap: 14px; }

  /* Small tablet / large phone (≤640px): begin compacting */
  @media (max-width: 640px) {
    .grid-3, .grid-2 { grid-template-columns: 1fr; gap: 12px; }

  /* Mobile (≤768px): single column for most, KPI 2x2, sidebar overlay */
  @media (max-width: 768px) {
    .sidebar {
      position: fixed; left: 0; top: 0; z-index: 200; height: 100vh;
      transform: translateX(-100%); box-shadow: var(--shadow-lg);
    }
    .sidebar.mobile-open { transform: translateX(0); }
    .sidebar.collapsed { transform: translateX(-100%); }
    .mobile-overlay {
      position: fixed; inset: 0; background: rgba(15,23,42,0.55); z-index: 199;
      backdrop-filter: blur(2px);
    }
    /* KPI는 2x2, 일반 그리드는 1col */
    .grid-5 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-4 { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .grid-3 { grid-template-columns: 1fr; gap: 12px; }
    .grid-2 { grid-template-columns: 1fr; gap: 12px; }
    .topbar { padding: 0 14px; height: 52px; gap: 8px; flex-wrap: nowrap; }
    .topbar-title { font-size: 13px; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .topbar-right { gap: 6px; flex-shrink: 0; }
    .topbar-right .btn { padding: 6px 10px; font-size: 12px; }
    .content { padding: 14px; }
    .card { padding: 14px; border-radius: var(--radius); }
    .card-header { gap: 8px; margin-bottom: 12px; }
    .quick-preview {
      width: 100% !important; max-width: 100% !important;
      left: 0; right: 0; bottom: 0; top: auto;
      border-radius: 16px 16px 0 0; max-height: 85vh;
    }
    .mobile-menu-btn { display: inline-flex !important; }
    .filter-bar { padding: 10px 12px; gap: 8px; }
    .filter-bar-main, .filter-bar-advanced { flex-wrap: wrap; gap: 8px; }
    .filter-bar-main > *, .filter-bar-advanced > * { flex: 1 1 100%; min-width: 0; }
    .filter-bar-main button, .filter-bar-advanced button { flex: 0 0 auto; }
    .search-input { min-width: 0; width: 100%; }
    .filter-select, .searchable-select-input { width: 100% !important; }
    .kpi-card { padding: 12px 14px; gap: 10px; }
    .kpi-value { font-size: 18px; }
    .kpi-label { font-size: 11px; }
    .kpi-icon-wrap { width: 36px; height: 36px; border-radius: 9px; }
    .summary-card { padding: 16px; }
    .summary-card .summary-title { font-size: 15px; }
    .summary-card .summary-meta { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    th, td { padding: 8px 10px; font-size: 12px; }
    .modal-content { width: 96vw; max-width: 96vw; max-height: 90vh; padding: 16px; }
    .btn { padding: 8px 14px; font-size: 13px; }
    .btn-sm { padding: 6px 10px; font-size: 11px; }
    .step-circle { width: 28px; height: 28px; font-size: 12px; }
    .step-label { font-size: 11px; }
    /* Step bar는 가로 스크롤 */
    .step-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    /* Tab buttons는 가로 스크롤 */
    .tab-bar, .tabs { overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap !important; }
  }
  /* Very small phones (≤380px) */
  @media (max-width: 380px) {
    .grid-5, .grid-4 { grid-template-columns: 1fr; }
    .topbar-title { font-size: 12px; }
    .kpi-value { font-size: 17px; }
  }
  /* Desktop (≥769px): always show sidebar, hide mobile menu */
  @media (min-width: 769px) {
    .mobile-menu-btn { display: none !important; }
    .mobile-overlay { display: none !important; }
  }
  /* Large desktop (≥1440px): 패딩 좀 더 여유 */
  @media (min-width: 1440px) {
    .content { padding: 28px 32px; }
  }
</style>

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useContext, createContext, useRef } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, LineChart, Line, Legend, ComposedChart } = Recharts;

const API = '/api/v1';

// ── 공용 API 헬퍼 (인증 토큰 자동 첨부 + JSON 파싱) ────────────────────────
const _authHeaders = () => {
  const t = localStorage.getItem('token');
  return t ? { 'Authorization': `Bearer ${t}` } : {};
};

const apiGet = (path, opts = {}) =>
  fetch(`${API}${path}`, { ...opts, headers: { ..._authHeaders(), ...(opts.headers || {}) } })
    .then(r => r.ok ? r.json() : Promise.reject(new Error(`${r.status}`)));

const apiSend = (method, path, body, opts = {}) =>
  fetch(`${API}${path}`, {
    method,
    headers: { 'Content-Type': 'application/json', ..._authHeaders(), ...(opts.headers || {}) },
    body: body ? JSON.stringify(body) : undefined,
    ...opts,
  }).then(r => r.ok ? r.json() : Promise.reject(new Error(`${r.status}`)));

const apiPost = (path, body, opts) => apiSend('POST', path, body, opts);
const apiPut  = (path, body, opts) => apiSend('PUT',  path, body, opts);

// 파일 다운로드 (xlsx blob 등) — 인증 헤더 + 자동 a.click
const apiDownload = (path, filename) =>
  fetch(`${API}${path}`, { headers: _authHeaders() })
    .then(r => r.ok ? r.blob() : Promise.reject(new Error(`${r.status}`)))
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

// ── 데이터 fetching 훅 — 의존성 변경 시 자동 재호출 + loading/error 관리 ───
function useFetch(url, deps = [], { skip = false, transform = (x) => x } = {}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  useEffect(() => {
    if (skip || !url) return;
    let cancelled = false;
    setLoading(true);
    apiGet(url)
      .then(d => { if (!cancelled) { setData(transform(d)); setError(null); } })
      .catch(e => { if (!cancelled) { setData(null); setError(e); } })
      .finally(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  // eslint-disable-next-line react-hooks/exhaustive-deps
  }, deps);
  return { data, loading, error, setData };
}

// ── 공통 상태 컴포넌트 ────────────────────────────────────────────────

function Icon({ name, size, className = '', style }) {

  const px = typeof size === 'number' ? size : (sizeMap[size] || 18);

    <svg className={'icon ' + className} style={style} width={px} height={px}
         viewBox="0 0 24 24" fill="none" stroke="currentColor"

      <path d={d} />
    </svg>
  );
}
// ── 라우터 훅 (path 기반) ────────────────────────────────────────────────
function useRoute() {
  const [path, setPath] = useState(window.location.pathname || '/');
  useEffect(() => {
    const onPop = () => setPath(window.location.pathname || '/');
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);
  const navigate = (p) => {
    if (p === window.location.pathname) return;
    window.history.pushState(null, '', p);
    setPath(p);
  };
  return [path, navigate];
}

// path → page id 매핑 헬퍼 (PAGES 기반)
function pathToPageId(path) {
  if (!path || path === '/') return 'announcements';
  // admin 하위 경로는 모두 admin 페이지로 매핑
  if (path.startsWith('/admin')) return 'admin';
  const found = (typeof PAGES !== 'undefined' ? PAGES : []).find(p => p.path === path);
  return found ? found.id : 'announcements';
}

// ── Searchable Select ────────────────────────────────────────────────────────
function SearchableSelect({ options, value, onChange, placeholder = '전체' }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const ref = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const filtered = options.filter(o => o.toLowerCase().includes(search.toLowerCase())).slice(0, 50);
  const displayValue = value === 'all' ? '' : value;

  return (
    <div className="searchable-select" ref={ref}>
      <input className="searchable-select-input"
        value={open ? search : displayValue}
        placeholder={placeholder}
        onFocus={() => { setOpen(true); setSearch(''); }}
        onChange={e => setSearch(e.target.value)} />
      {open && (
        <div className="searchable-select-dropdown">
          <div className={`searchable-select-item ${value === 'all' ? 'selected' : ''}`}
            onClick={() => { onChange('all'); setOpen(false); setSearch(''); }}>
            {placeholder}
          </div>
          {filtered.map(o => (
            <div key={o} className={`searchable-select-item ${value === o ? 'selected' : ''}`}
              onClick={() => { onChange(o); setOpen(false); setSearch(''); }}>
              {o}
            </div>
          ))}
          {filtered.length === 0 && <div style={{padding:'8px 12px',fontSize:'12px',color:'#94A3B8'}}>결과 없음</div>}
        </div>
      )}
    </div>
  );
}

function fmtAmount(n) {
  if (n == null) return '-';
  if (n === 0 || n === '0') return '비공개';   // G2B 외자/협상 케이스
  return new Intl.NumberFormat('ko-KR').format(Math.round(n / 10000)) + '만원';
}

function fmt(n) {
  if (n == null) return '-';
  if (n === 0 || n === '0') return '비공개';
  return Math.round(n / 10000).toLocaleString();
}

// ── Toast Context ─────────────────────────────────────────────────────────────
const ToastContext = createContext();
function useToast() { return useContext(ToastContext); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const addToast = useCallback((message, type = 'info') => {
    const id = Date.now();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3000);
  }, []);
  return (
    <ToastContext.Provider value={addToast}>
      {children}
      <div className="toast-container">
        {toasts.map(t => <div key={t.id} className={`toast toast-${t.type}`}>{t.message}</div>)}
      </div>
    </ToastContext.Provider>
  );
}

// ── Modal ──────────────────────────────────────────────────────────────────────
function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal-content">
        <div className="modal-header">
          <div className="modal-title">{title}</div>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── CSV Download ──────────────────────────────────────────────────────────────
function downloadCSV(data, columns, filename) {
  const header = columns.map(c => c.label).join(',');
  const rows = data.map(d => columns.map(c => {
    let v = typeof c.fmt === 'function' ? c.fmt(d[c.key]) : (d[c.key] ?? '');
    v = String(v).replace(/"/g, '""');
    return `"${v}"`;
  }).join(','));
  const csv = '\uFEFF' + [header, ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Page 1: 공고화면 ─────────────────────────────────────────────────────────
function getDDay(deadlineStr) {
  if (!deadlineStr) return null;
  const deadline = new Date(deadlineStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  deadline.setHours(0,0,0,0);
  const diff = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
  if (diff < 0) return { text: '마감', cls: 'passed' };
  if (diff === 0) return { text: 'D-Day', cls: 'urgent' };
  if (diff <= 3) return { text: `D-${diff}`, cls: 'urgent' };
  if (diff <= 7) return { text: `D-${diff}`, cls: 'soon' };
  return { text: `D-${diff}`, cls: 'normal' };
}

function AnnouncementPage({ onSelectAnnouncement }) {

  const [page, setPage] = useState(1);

  const tableWrapRef = useRef(null);
  const addToast = useToast();

  // Detect table horizontal scroll
  useEffect(() => {
    const el = tableWrapRef.current;
    if (!el) return;
    const check = () => el.classList.toggle('has-scroll', el.scrollWidth > el.clientWidth && el.scrollLeft < el.scrollWidth - el.clientWidth - 5);
    check();
    el.addEventListener('scroll', check);
    const ro = new ResizeObserver(check);
    ro.observe(el);
    return () => { el.removeEventListener('scroll', check); ro.disconnect(); };
  });

  const fetchData = () => {
    setLoading(true);
    const params = new URLSearchParams({ page, page_size: 20 });
    if (filter.type !== 'all') {
      params.set('category', filter.type);
    } else {
      params.set('category', '공사,용역');
    }
    if (filter.area !== 'all') params.set('region', filter.area);
    if (filter.source !== 'all') params.set('source', filter.source);
    if (filter.status !== 'all') params.set('status', filter.status);
    if (filter.industry !== 'all') params.set('industry_code', filter.industry);
    if (filter.dateFrom) params.set('date_from', filter.dateFrom);
    if (filter.dateTo) params.set('date_to', filter.dateTo);
    if (filter.search) params.set('keyword', filter.search);

    apiGet(`/announcements?${params}`).then(d => {
        const filtered = (d.items || []).filter(i => i.type === '공사' || i.type === '용역');
        setData({ ...d, items: filtered });
        setLoading(false);
      })
      .catch(() => setLoading(false));
  };

  useEffect(() => { fetchData(); }, [page]);
  useEffect(() => {
    apiGet(`/stats/kpi`).then(setKpi);
    apiGet(`/meta/industry-codes`).then(d => setIndustryCodes(d.codes || [])).catch(() => {});
  }, []);

  const handleFilter = () => { setPage(1); fetchData(); };

  const handleCSV = () => {
    const cols = [
      { key: 'bid_number', label: '공고번호' },
      { key: 'title', label: '공고명' },
      { key: 'org', label: '발주기관' },
      { key: 'type', label: '유형' },
      { key: 'area', label: '지역' },
      { key: 'budget', label: '예산(만원)', fmt: v => fmt(v) },
      { key: 'deadline', label: '마감일' },
      { key: 'rate', label: '사정률(%)' },
      { key: 'first_place_rate', label: '1순위 사정률(%)' },
    ];
    downloadCSV(data.items, cols, '공고목록.csv');
    addToast('CSV 다운로드 완료', 'success');
  };

  const handleRowClick = (item) => {
    setPreviewItem(item);
    setQuickRate(item.rate ? String(item.rate) : '');
  };

  // ESC 키로 미리보기 닫기 (오버레이 UX 표준)
  useEffect(() => {
    if (!previewItem) return;
    const onKey = (e) => { if (e.key === 'Escape') setPreviewItem(null); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [previewItem]);

  const quickBidAmount = quickRate && previewItem?.budget
    ? Math.round(previewItem.budget * parseFloat(quickRate) / 100) : null;

  return (
    <div>
      <div className="grid-4 mb-16">
        {kpi ? [
          { label: '전체공고', value: (kpi.total_announcements?.toLocaleString() || 0) + '건', icon: 'list', tone: '' },
          { label: '공사', value: (kpi.construction_count?.toLocaleString() || 0) + '건', icon: 'building', tone: 'tone-amber' },
          { label: '용역', value: (kpi.service_count?.toLocaleString() || 0) + '건', icon: 'ruler', tone: 'tone-purple' },
          { label: '평균 사정률', value: (kpi.avg_assessment_rate || '-') + '%', icon: 'chart', tone: 'tone-green' },
        ].map((k, i) => (
          <div key={i} className={'kpi-card ' + k.tone}>
            <div className="kpi-icon-wrap"><Icon name={k.icon} size={20} /></div>
            <div className="kpi-body">
              <div className="kpi-label">{k.label}</div>
              <div className="kpi-value">{k.value}</div>
            </div>
          </div>
        )) : (
          <React.Fragment>
            {[1,2,3,4].map(i => (
              <div key={i} className="kpi-card">
                <div className="kpi-icon-wrap" style={{background:'#F1F5F9'}}>&nbsp;</div>
                <div className="kpi-body">
                  <div className="skeleton skel-12-60" >&nbsp;</div>
                  <div className="skeleton skel-24-80" >&nbsp;</div>
                </div>
              </div>
            ))}
          </React.Fragment>
        )}
      </div>
      <div className="filter-bar">
        <div className="filter-bar-main">
          <input className="search-input" placeholder="공고명, 발주기관 검색..." value={filter.search}

            onChange={e => { setFilter(f => ({...f, type: e.target.value})); setTimeout(() => { setPage(1); fetchData(); }, 0); }}>

            onChange={e => { setFilter(f => ({...f, status: e.target.value})); setTimeout(() => { setPage(1); fetchData(); }, 0); }}>

            {showAdvancedFilter ? '필터 접기 ▲' : '고급 필터 ▼'}
