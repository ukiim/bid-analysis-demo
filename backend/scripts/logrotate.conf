# logrotate 설정 파일 — bid-insight (호스트 측 옵션)
# Python RotatingFileHandler를 이미 사용 중이라면 이 파일은 불필요.
#
# 적용 방법 (NAS 호스트):
#   sudo cp logrotate.conf /etc/logrotate.d/bid-insight
#   sudo logrotate -d /etc/logrotate.d/bid-insight   # dry-run 검증
#
# Synology DSM은 기본적으로 logrotate가 설치되어 있지 않을 수 있으므로
# Python RotatingFileHandler 사용 권장.

/volume1/docker/bid-insight/data/server.log {
    # 매일 회전
    daily
    # 최근 14개 보관
    rotate 14
    # 1MB 이상일 때만 회전
    minsize 1M
    # 회전 후 압축 (gzip)
    compress
    # 어제 로그는 압축하지 않음 (디버깅용)
    delaycompress
    # 빈 로그도 회전
    notifempty
    # 권한 보존
    create 0644 1000 1000
    # 회전 후 컨테이너에 SIGUSR1 전송 (uvicorn은 무시)
    # 또는 Python RotatingFileHandler가 자체 처리
    missingok
    # 압축 후 별도 명령 실행하지 않음
    sharedscripts
}

# 백업 로그 (선택)
/volume1/docker/bid-insight/data/backup.log {
    weekly
    rotate 4
    compress
    delaycompress
    notifempty
    missingok
    create 0644 1000 1000
}
